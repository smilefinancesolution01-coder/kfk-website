<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK | Confirm Your Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .input-field { border: 2px solid #e2e8f0; transition: all 0.3s ease; }
        .input-field:focus { border-color: #f97316; box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.1); outline: none; }
        .mesho-shadow { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <header class="bg-white p-6 shadow-sm sticky top-0 z-50 flex items-center gap-4">
        <button onclick="history.back()" class="text-2xl">←</button>
        <h1 class="text-xl font-extrabold italic uppercase tracking-tighter text-[#002e6e]">Checkout</h1>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="bg-white p-5 rounded-[2rem] mesho-shadow flex gap-4">
            <img id="summary-img" src="" class="w-24 h-24 rounded-2xl object-cover shadow-sm bg-slate-100">
            <div class="flex-1">
                <h2 id="summary-name" class="font-black text-slate-800 uppercase text-sm leading-tight">Product Name</h2>
                <p id="summary-weight" class="text-slate-400 text-xs font-bold mt-1">Weight: 1kg</p>
                <div class="flex items-center gap-2 mt-2">
                    <span class="text-orange-600 font-black text-lg">₹<span id="summary-price">0</span></span>
                    <span class="bg-green-100 text-green-600 text-[10px] px-2 py-0.5 rounded-full font-black uppercase">Free Delivery</span>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] mesho-shadow space-y-4 border border-slate-100">
            <div class="flex items-center gap-2 mb-2">
                <span class="text-orange-500">📍</span>
                <h3 class="font-black text-slate-800 uppercase text-xs tracking-widest">Delivery Details</h3>
            </div>
            
            <input type="text" id="cust-name" placeholder="Full Name" class="input-field w-full p-4 rounded-2xl font-bold text-sm">
            <input type="tel" id="cust-phone" placeholder="Mobile Number" class="input-field w-full p-4 rounded-2xl font-bold text-sm">
            
            <div class="space-y-3 pt-2">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Address Information</p>
                <input type="text" id="cust-house" placeholder="House No. / Building Name" class="input-field w-full p-4 rounded-2xl font-bold text-sm">
                <input type="text" id="cust-street" placeholder="Road Name / Area / Colony" class="input-field w-full p-4 rounded-2xl font-bold text-sm">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="cust-pin" placeholder="Pincode" class="input-field w-full p-4 rounded-2xl font-bold text-sm">
                    <input type="text" id="cust-city" placeholder="City" class="input-field w-full p-4 rounded-2xl font-bold text-sm">
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[2.5rem] mesho-shadow space-y-4">
            <div class="flex items-center gap-2 mb-2">
                <span class="text-orange-500">💳</span>
                <h3 class="font-black text-slate-800 uppercase text-xs tracking-widest">Select Payment</h3>
            </div>
            
            <div class="grid grid-cols-2 gap-3">
                <button onclick="setPayment('UPI')" id="pay-upi" class="p-4 rounded-2xl border-2 border-orange-500 bg-orange-50 text-orange-600 font-black text-xs uppercase transition-all">Online UPI</button>
                <button onclick="setPayment('COD')" id="pay-cod" class="p-4 rounded-2xl border-2 border-slate-100 text-slate-400 font-black text-xs uppercase transition-all">Cash on Delivery</button>
            </div>

            <div id="qr-container" class="mt-4 p-4 bg-slate-50 rounded-3xl text-center space-y-3 hidden">
                <p class="text-[9px] font-black uppercase text-blue-600 tracking-tighter">Scan to Pay & Take Screenshot</p>
                <img id="qr-image" src="" class="w-48 h-48 mx-auto rounded-xl shadow-lg border-4 border-white">
                <p class="text-[10px] font-bold text-slate-400">Merchant: KOLKATA FISH KITCHEN</p>
            </div>
        </div>

        <button onclick="placeOrder()" id="order-btn" class="w-full bg-[#002e6e] text-white py-6 rounded-[2rem] font-black uppercase tracking-[0.2em] shadow-2xl active:scale-95 transition-all">
            Confirm Order 🚀
        </button>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDWHPt3Kya_s-9f62RsLfI_G1RgQU5P534",
            authDomain: "kfk-fish.firebaseapp.com",
            projectId: "kfk-fish",
            storageBucket: "kfk-fish.firebasestorage.app",
            messagingSenderId: "171442898165",
            appId: "1:171442898165:web:9234070d781b8138d4b1bc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Load data from LocalStorage
        const selectedProduct = JSON.parse(localStorage.getItem('selectedProduct'));
        let selectedPayment = 'UPI';

        if(selectedProduct) {
            document.getElementById('summary-name').innerText = selectedProduct.name;
            document.getElementById('summary-price').innerText = selectedProduct.price;
            document.getElementById('summary-weight').innerText = `Unit: ${selectedProduct.weight}`;
            document.getElementById('summary-img').src = selectedProduct.image;
            updateQR(selectedProduct.price);
        }

        window.setPayment = (type) => {
            selectedPayment = type;
            const upiBtn = document.getElementById('pay-upi');
            const codBtn = document.getElementById('pay-cod');
            const qrBox = document.getElementById('qr-container');

            if(type === 'UPI') {
                upiBtn.className = "p-4 rounded-2xl border-2 border-orange-500 bg-orange-50 text-orange-600 font-black text-xs uppercase transition-all";
                codBtn.className = "p-4 rounded-2xl border-2 border-slate-100 text-slate-400 font-black text-xs uppercase transition-all";
                qrBox.classList.remove('hidden');
            } else {
                codBtn.className = "p-4 rounded-2xl border-2 border-orange-500 bg-orange-50 text-orange-600 font-black text-xs uppercase transition-all";
                upiBtn.className = "p-4 rounded-2xl border-2 border-slate-100 text-slate-400 font-black text-xs uppercase transition-all";
                qrBox.classList.add('hidden');
            }
        };

        function updateQR(amount) {
            const upiId = "kolka97560@barodampay";
            const merchantName = "KOLKATA FISH KITCHEN";
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=upi://pay?pa=${upiId}%26pn=${encodeURIComponent(merchantName)}%26am=${amount}%26cu=INR`;
            document.getElementById('qr-image').src = qrUrl;
            document.getElementById('qr-container').classList.remove('hidden');
        }

        window.placeOrder = async () => {
            const name = document.getElementById('cust-name').value;
            const phone = document.getElementById('cust-phone').value;
            const house = document.getElementById('cust-house').value;
            const street = document.getElementById('cust-street').value;
            const city = document.getElementById('cust-city').value;
            const pin = document.getElementById('cust-pin').value;

            if(!name || !phone || !house || !city) return alert("Meesho ki tarah poora address bhariye!");

            const btn = document.getElementById('order-btn');
            btn.disabled = true; btn.innerText = "PLACING ORDER...";

            try {
                await addDoc(collection(db, "orders"), {
                    customerName: name,
                    customerPhone: phone,
                    address: `${house}, ${street}, ${city} - ${pin}`,
                    item: selectedProduct.name,
                    price: selectedProduct.price,
                    payment: selectedPayment,
                    status: 'Pending',
                    createdAt: serverTimestamp()
                });

                alert("Order Successful! Aapka machhli ka order le liya gaya hai.");
                location.href = "index.html";
            } catch (e) { alert(e.message); btn.disabled = false; }
        };
    </script>
</body>
</html>
