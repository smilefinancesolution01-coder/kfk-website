<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Online | KFK Digital Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">
    <nav class="p-8 flex justify-between items-center border-b">
        <a href="index.html" class="text-[10px] font-black tracking-[0.3em] text-blue-900 uppercase">← Back</a>
        <div class="text-2xl font-black text-blue-900 italic">KFK <span class="text-orange-500">EXPRESS</span></div>
    </nav>

    <section class="min-h-screen flex items-center justify-center py-20 bg-slate-50">

            <h1 class="text-6xl font-black text-blue-950 uppercase mb-8 tracking-tighter">Experience <br><span class="text-orange-600">Pure Energy.</span></h1>

                    <span class="block text-4xl mb-4 group-hover:scale-110 transition">🥡</span>
                    <span class="font-black uppercase tracking-widest text-xs">Instant Takeaway</span>
                </button>
            </div>
            <p class="mt-12 text-[10px] font-bold text-slate-300 uppercase tracking-[0.5em]">Now serving 50+ Global Locations</p>
        </div>
