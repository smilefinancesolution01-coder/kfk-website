<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | KFK India - Secure Payment</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .form-input { width: 100%; padding: 1rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; background: #f8fafc; font-size: 0.875rem; }
        .form-input:focus { outline: 2px solid #f97316; border-color: transparent; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="h-20 bg-white border-b flex items-center px-6">
        <a href="index.html" class="text-2xl font-black text-[#002e6e] italic uppercase">KFK<span class="text-orange-500">.</span>India</a>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            
            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <h2 class="text-2xl font-black uppercase italic mb-8">Delivery Information</h2>
                    <form class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="text-[10px] font-black uppercase mb-2 block">Full Name</label>
                                <input type="text" class="form-input" placeholder="Enter name">
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase mb-2 block">Phone Number</label>
                                <input type="tel" class="form-input" placeholder="+91 00000 00000">
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-black uppercase mb-2 block">Full Address (House No, Building, Street)</label>
                            <textarea rows="3" class="form-input" placeholder="Type your full address..."></textarea>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                            <div>
                                <label class="text-[10px] font-black uppercase mb-2 block">Pincode</label>
                                <input type="text" class="form-input" placeholder="6 Digits">
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase mb-2 block">City</label>
                                <select class="form-input">
                                    <option>Delhi</option>
                                    <option>Kolkata</option>
                                    <option>Gurugram</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>

                <div class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <h2 class="text-2xl font-black uppercase italic mb-6">Payment Method</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <label class="border-2 border-orange-500 p-4 rounded-xl flex items-center justify-center gap-3 cursor-pointer bg-orange-50">
                            <input type="radio" name="pay" checked>
                            <span class="text-xs font-black uppercase">COD</span>
                        </label>
                        <label class="border-2 border-gray-100 p-4 rounded-xl flex items-center justify-center gap-3 cursor-pointer">
                            <input type="radio" name="pay">
                            <span class="text-xs font-black uppercase">UPI/Card</span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-[#002e6e] text-white p-8 rounded-[2.5rem] sticky top-24 shadow-xl">
                    <h2 class="text-xl font-black uppercase italic mb-8 border-b border-white/10 pb-4">Order Summary</h2>
                    <div class="space-y-6">
                        <div class="flex justify-between items-center border-b border-white/5 pb-4">
                            <span class="text-[10px] font-bold uppercase text-slate-400">Subtotal</span>
                            <span class="text-sm font-black">₹0.00</span>
                        </div>
                        <div class="flex justify-between items-center border-b border-white/5 pb-4">
                            <span class="text-[10px] font-bold uppercase text-slate-400">Delivery Fee</span>
                            <span class="text-sm font-black text-green-400">FREE</span>
                        </div>
                        <div class="flex justify-between items-center pt-4">
                            <span class="text-lg font-black uppercase italic">Total</span>
                            <span class="text-2xl font-black text-orange-500">₹0.00</span>
                        </div>
                    </div>
                    <button class="w-full bg-orange-500 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest mt-10 hover:bg-white hover:text-black transition-all">Place Order</button>
                    <p class="text-[8px] text-center mt-6 text-slate-400 font-bold uppercase tracking-widest">Secure 256-bit Encrypted Checkout</p>
                </div>
            </div>
            
        </div>
    </main>

    <footer class="py-12 text-center text-[9px] font-black text-slate-400 uppercase tracking-[0.4em]">
        © 2026 KFK India | Express Delivery Network
    </footer>

</body>
</html>
