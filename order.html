<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK Order Checkout | Real Payout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <header class="bg-white border-b py-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-[#002e6e] italic tracking-tighter">KFK<span class="text-orange-500">.</span>CHECKOUT</a>
            <a href="menu.html" class="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-orange-500">← Back to Menu</a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
            
            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-gray-100">
                    <h2 class="text-xl font-black text-[#002e6e] uppercase italic mb-6">Your Fresh Selection</h2>
                    <div id="cart-items-display" class="space-y-4">
                        </div>
                </div>
            </div>

            <div class="lg:col-span-1">
                <div class="bg-[#002e6e] text-white p-8 rounded-[3rem] sticky top-32 shadow-2xl">
                    <h2 class="text-xl font-black uppercase italic mb-8">Bill Details</h2>
                    
                    <div class="space-y-4 border-b border-white/10 pb-6 mb-6">
                        <div class="flex justify-between text-xs font-bold uppercase tracking-widest">
                            <span>Item Total</span>
                            <span id="subtotal">₹0</span>
                        </div>
                        <div class="flex justify-between text-xs font-bold uppercase tracking-widest">
                            <span>Delivery Partner Fee</span>
                            <span class="text-orange-400">₹65</span>
                        </div>
                        <div class="flex justify-between text-xs font-bold uppercase tracking-widest">
                            <span>Govt. Taxes (GST)</span>
                            <span id="tax">₹0</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-end mb-10">
                        <div>
                            <p class="text-[10px] font-black uppercase tracking-widest text-orange-400">Total to Pay</p>
                            <p id="final-total" class="text-4xl font-black italic">₹0</p>
                        </div>
                    </div>

                    <button onclick="payNow()" class="w-full bg-orange-500 hover:bg-white hover:text-[#002e6e] py-5 rounded-2xl font-black uppercase text-xs tracking-widest transition-all shadow-xl">
                        Pay & Confirm Order
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function updateOrderPage() {
            // LocalStorage se cart data uthana
            const cart = JSON.parse(localStorage.getItem('kfk_cart')) || [];
            const display = document.getElementById('cart-items-display');
            
            if (cart.length === 0) {
                display.innerHTML = `<p class="text-slate-400 font-bold uppercase text-[10px]">Cart is empty! Machhli add karo pehle.</p>`;
                return;
            }

            let itemTotal = 0;
            display.innerHTML = '';

            cart.forEach((item, index) => {
                const price = parseInt(item.price);
                itemTotal += price;
                display.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-5 rounded-2xl border border-gray-100">
                        <div class="flex items-center gap-4">
                            <span class="w-8 h-8 bg-[#002e6e] text-white rounded-full flex items-center justify-center text-[10px] font-black">${index + 1}</span>
                            <div>
                                <h4 class="text-xs font-black uppercase text-[#002e6e]">${item.name}</h4>
                                <p class="text-[9px] font-bold text-slate-400 uppercase">Premium Quality Fresh Catch</p>
                            </div>
                        </div>
                        <span class="font-black text-sm">₹${price}</span>
                    </div>
                `;
            });

            const deliveryCharge = 65;
            const gst = Math.round(itemTotal * 0.05);
            const finalPay = itemTotal + deliveryCharge + gst;

            document.getElementById('subtotal').innerText = `₹${itemTotal}`;
            document.getElementById('tax').innerText = `₹${gst}`;
            document.getElementById('final-total').innerText = `₹${finalPay}`;
        }

        function payNow() {
            alert("Redirecting to Secure Payment Gateway... ₹" + document.getElementById('final-total').innerText);
        }

        window.onload = updateOrderPage;
    </script>
</body>
</html>
