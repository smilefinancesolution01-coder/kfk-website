<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK India | Official Seafood Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .category-tab.active { color: #e03546; border-bottom: 3px solid #e03546; font-weight: 800; }
        .product-card { border-bottom: 1px solid #f1f5f9; padding: 1.5rem 0; display: flex; justify-content: space-between; gap: 1rem; transition: all 0.2s; }
        .product-card:hover { background-color: #fafafa; border-radius: 12px; padding-left: 10px; padding-right: 10px; }
        .cart-drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-900">

    <header class="sticky top-0 z-[100] bg-white border-b border-slate-100 px-6 py-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic text-[#e03546] tracking-tighter uppercase">KFK<span class="text-slate-900">.INDIA</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.3em]">Premium Quality Seafood</p>
            </div>
            <button onclick="toggleCart()" class="bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2">
                <span id="cart-count">0</span> Items
            </button>
        </div>
    </header>

    <nav class="sticky top-[73px] z-[90] bg-white border-b overflow-x-auto no-scrollbar py-3 px-6">
        <div id="category-tabs" class="max-w-5xl mx-auto flex gap-6 whitespace-nowrap text-[11px] font-black uppercase tracking-widest">
            </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 py-10 mb-32">
        <div id="product-list" class="space-y-2">
            </div>
    </main>

    <div id="checkout-bar" class="fixed bottom-0 left-0 w-full bg-white border-t p-5 hidden shadow-[0_-10px_30px_rgba(0,0,0,0.08)] z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <p id="bar-total" class="text-2xl font-black text-slate-900 tracking-tighter">₹0</p>
            <button onclick="toggleCart()" class="bg-[#e03546] text-white px-10 py-4 rounded-2xl font-black uppercase text-[11px] tracking-widest shadow-xl shadow-red-100">View Basket</button>
        </div>
    </div>

    <div id="cart-overlay" class="fixed inset-0 bg-slate-900/40 z-[200] hidden backdrop-blur-sm" onclick="toggleCart()"></div>
    <div id="cart-drawer" class="fixed right-0 top-0 h-full w-full max-w-md bg-white z-[201] cart-drawer translate-x-full flex flex-col">
        <div class="p-8 border-b flex justify-between items-center bg-slate-50">
            <h2 class="text-xl font-black italic uppercase">Your Order</h2>
            <button onclick="toggleCart()" class="text-3xl text-slate-300">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-8 border-t space-y-6">
            <div class="flex justify-between font-bold text-lg"><span>Total</span><span id="grand-total">₹0</span></div>
            <button onclick="checkout()" class="w-full bg-[#e03546] text-white py-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg">Order via UPI</button>
        </div>
    </div>

    <script>
        // Professional CDN Links (Dam Good Fish Style)
        const categories = [
            { id: 'river', name: 'River Fish', img: 'https://images.unsplash.com/photo-1534604973900-c41ab4c5e636?w=600' },
            { id: 'sea', name: 'Sea Food', img: 'https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=600' },
            { id: 'prawns', name: 'Prawns', img: 'https://images.unsplash.com/photo-1559737558-2f5a35f4523b?w=600' },
            { id: 'bengali', name: 'Bengali Special', img: 'https://images.unsplash.com/photo-1590546452302-602d6ad61e3f?w=600' },
            { id: 'snacks', name: 'Fish Snacks', img: 'https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=600' }
        ];

        const fishNames = {
            river: ["Fresh Rohu", "Catla Steaks", "Pabda Whole", "Tangra", "Boal Cut"],
            sea: ["White Pomfret", "Surmai Steaks", "Red Snapper", "Indian Salmon"],
            prawns: ["Tiger Prawns", "Jumbo Prawns", "White Shrimps"],
            bengali: ["Padma Ilish", "Chital Muitha", "Koi Fish", "Kajoli"],
            snacks: ["Fish Fingers", "Fish Pakora", "Fish Cutlet"]
        };

        let inventory = [];
        let cart = [];

        function initInventory() {
            let id = 1;
            categories.forEach(c => {
                for(let i=0; i<40; i++) { // Creating 200 items
                    let base = fishNames[c.id][i % fishNames[c.id].length];
                    inventory.push({
                        id: id++,
                        name: `${base} ${i === 0 ? '' : '(Selection ' + i + ')'}`,
                        catId: c.id,
                        price: 180 + (Math.floor(Math.random() * 50) * 10),
                        img: c.img,
                        weight: i % 2 === 0 ? "1kg" : "500g"
                    });
                }
            });
        }

        function render(catId) {
            document.querySelectorAll('.category-tab').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${catId}`).classList.add('active');

            const container = document.getElementById('product-list');
            container.innerHTML = '';
            inventory.filter(p => p.catId === catId).forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <div class="flex-1">
                            <h3 class="text-lg font-bold text-slate-800 leading-tight">${p.name}</h3>
                            <p class="text-sm font-black text-slate-900 mt-1">₹${p.price} <span class="text-slate-400 font-medium text-[10px]">/ ${p.weight}</span></p>
                            <p class="text-[11px] text-slate-400 mt-4 leading-relaxed line-clamp-2">Premium quality catch, cleaned and packed with cold-chain technology for maximum freshness.</p>
                        </div>
                        <div class="relative w-32 h-32 flex-shrink-0">
                            <img src="${p.img}" class="w-full h-full object-cover rounded-3xl border border-slate-50 shadow-sm">
                            <button onclick="addToCart(${p.id})" class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-white text-[#e03546] border border-slate-100 shadow-xl px-7 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">Add +</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(pid) {
            const item = inventory.find(x => x.id === pid);
            cart.push({...item, cartId: Date.now()});
            updateUI();
            document.getElementById('checkout-bar').classList.remove('hidden');
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const drawer = document.getElementById('cart-items');
            drawer.innerHTML = cart.length ? '' : '<p class="text-center py-20 text-slate-300 font-bold uppercase text-[10px]">Cart is empty</p>';
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                drawer.innerHTML += `<div class="bg-slate-50 p-4 rounded-2xl flex justify-between items-center"><span class="text-[10px] font-bold uppercase">${item.name}</span><span class="text-xs font-black">₹${item.price}</span></div>`;
            });
            document.getElementById('grand-total').innerText = `₹${total}`;
            document.getElementById('bar-total').innerText = `₹${total}`;
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('translate-x-full');
            document.getElementById('cart-overlay').classList.toggle('hidden');
        }

        function checkout() {
            const total = document.getElementById('bar-total').innerText.replace('₹','');
            window.location.href = `upi://pay?pa=kolka97560@barodampay&pn=KFK_INDIA&am=${total}&cu=INR`;
        }

        initInventory();
        const nav = document.getElementById('category-tabs');
        categories.forEach(c => {
            nav.innerHTML += `<button id="tab-${c.id}" onclick="render('${c.id}')" class="category-tab pb-2 transition-all px-2">${c.name}</button>`;
        });
        render('river');
    </script>
</body>
</html>
