<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Fish Market | KFK India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .category-btn.active { background: #002e6e; color: white; border-color: #002e6e; }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="bg-gray-50">

    <header class="sticky top-0 z-[100] bg-white border-b border-gray-100 p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-[#002e6e] italic">KFK<span class="text-orange-500">.</span>INDIA</a>
            <div class="flex items-center gap-4">
                <span class="text-[10px] font-black uppercase text-slate-400">Delhi & Kolkata Express</span>
                <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center">🛒</div>
            </div>
        </div>
    </header>

    <section class="bg-white border-b sticky top-[73px] z-[90] overflow-x-auto">
        <div class="max-w-7xl mx-auto px-4 py-4 flex gap-3 whitespace-nowrap hide-scrollbar" id="filter-bar">
            <button onclick="filterProducts('all')" class="category-btn active px-6 py-2 rounded-full border border-gray-200 text-[10px] font-black uppercase tracking-widest">All</button>
            <button onclick="filterProducts('river')" class="category-btn px-6 py-2 rounded-full border border-gray-200 text-[10px] font-black uppercase tracking-widest">River Fish</button>
            <button onclick="filterProducts('prawns')" class="category-btn px-6 py-2 rounded-full border border-gray-200 text-[10px] font-black uppercase tracking-widest">Prawns</button>
            <button onclick="filterProducts('boneless')" class="category-btn px-6 py-2 rounded-full border border-gray-200 text-[10px] font-black uppercase tracking-widest">Boneless</button>
            <button onclick="filterProducts('steaks')" class="category-btn px-6 py-2 rounded-full border border-gray-200 text-[10px] font-black uppercase tracking-widest">Steaks</button>
            <button onclick="filterProducts('fastfood')" class="category-btn px-6 py-2 rounded-full border border-gray-200 text-[10px] font-black uppercase tracking-widest">Fish Fast-Food</button>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="product-grid">
            </div>
    </main>

    <script>
        const products = [
            // RIVER FISH
            {id: 1, cat: 'river', n: 'Premium Rohu Cut', p: '428', w: '500g', q: 'rohu fish raw'},
            {id: 2, cat: 'river', n: 'Catla Bengali Cut', p: '450', w: '500g', q: 'catla fish'},
            {id: 3, cat: 'river', n: 'Hilsa (Padma)', p: '1899', w: '1kg', q: 'hilsa fish'},
            
            // PRAWNS
            {id: 4, cat: 'prawns', n: 'Jumbo Tiger Prawns', p: '850', w: '250g', q: 'tiger prawns'},
            {id: 5, cat: 'prawns', n: 'Small White Prawns', p: '399', w: '250g', q: 'fresh prawns'},

            // BONELESS & STEAKS
            {id: 6, cat: 'boneless', n: 'Bhetki Fillet', p: '950', w: '500g', q: 'fish fillet'},
            {id: 7, cat: 'steaks', n: 'Surmai Steaks', p: '799', w: '500g', q: 'king fish steak'},

            // FISH FAST FOOD (Your Menu Card Update)
            {id: 8, cat: 'fastfood', n: 'KFK Special Fish Burger', p: '249', w: '2 Pcs', q: 'fish burger'},
            {id: 9, cat: 'fastfood', n: 'Crunchy Fish Fingers', p: '320', w: '10 Pcs', q: 'fish fingers'},
            {id: 10, cat: 'fastfood', n: 'Protein Fish Bowl', p: '450', w: '1 Bowl', q: 'grilled fish salad'}
        ];

        const API_KEY = "kfzzPEicE21y0WcDJEMhLn0eUETxYReptyKIbwehcGdtGB3oW4Ka7xYj";

        function renderProducts(filter = 'all') {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);

            filtered.forEach(p => {
                const card = `
                    <div class="bg-white rounded-[2rem] p-4 shadow-sm border border-gray-100 product-card flex flex-col justify-between">
                        <div>
                            <div class="aspect-square rounded-2xl overflow-hidden bg-gray-50 mb-4">
                                <img id="img-${p.id}" class="w-full h-full object-cover" src="https://via.placeholder.com/300?text=Loading...">
                            </div>
                            <h3 class="text-xs md:text-sm font-black uppercase italic leading-tight mb-1">${p.n}</h3>
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${p.w}</p>
                        </div>
                        <div class="mt-4">
                            <div class="flex items-center justify-between mb-4">
                                <span class="text-sm font-black text-[#002e6e]">₹${p.p}</span>
                                <span class="text-[8px] font-black text-orange-500 uppercase tracking-tighter">Express Delivery</span>
                            </div>
                            <button class="w-full bg-[#002e6e] text-white py-3 rounded-xl text-[9px] font-black uppercase tracking-[0.2em] hover:bg-orange-500 transition-all">Add to Cart</button>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
                fetchImg(p.q, `img-${p.id}`);
            });
        }

        async function fetchImg(q, id) {
            try {
                const r = await fetch(`https://api.pexels.com/v1/search?query=${q}&per_page=1`, {headers:{Authorization:API_KEY}});
                const d = await r.json();
                if(d.photos.length > 0) document.getElementById(id).src = d.photos[0].src.large;
            } catch(e) {}
        }

        function filterProducts(cat) {
            // Update Active Button
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            renderProducts(cat);
        }

        // Automatic URL logic: Agar home page se ?cat=prawns aaye
        const urlParams = new URLSearchParams(window.location.search);
        const catParam = urlParams.get('cat') || 'all';
        
        renderProducts(catParam);

    </script>
</body>
</html>
