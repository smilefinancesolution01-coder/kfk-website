<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK Fresh | Order Fish Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafafa; }
        .product-card { transition: all 0.4s ease; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-slate-50">

    <header class="bg-[#002e6e] text-white p-10 rounded-b-[3.5rem] shadow-2xl text-center">
        <h1 class="text-4xl font-black italic tracking-tighter uppercase">KFK <span class="text-orange-500">FRESH</span></h1>
        <p class="text-blue-200 font-bold text-[10px] uppercase tracking-widest mt-2 underline decoration-orange-500">Fastest Delivery in Delhi</p>
    </header>

    <main class="p-6 lg:p-12">
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-20 text-slate-400 font-bold animate-pulse uppercase tracking-widest">Fetching Live Stock...</div>
        </div>
    </main>

    <div id="checkout-modal" class="fixed inset-0 bg-black/70 backdrop-blur-md z-[100] hidden flex items-end lg:items-center justify-center">
        <div class="bg-white w-full max-w-lg rounded-t-[3rem] lg:rounded-[3rem] p-8 shadow-2xl animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic text-slate-800 uppercase tracking-tighter">Order Details</h2>
                <button onclick="closeCheckout()" class="bg-slate-100 p-2 rounded-full text-slate-400 text-xs font-bold">CLOSE X</button>
            </div>

            <div id="selected-item-info" class="flex gap-4 p-4 bg-blue-50 rounded-3xl mb-6 border border-blue-100"></div>

            <div class="space-y-4 mb-6">
                <input type="text" id="cust-name" placeholder="Full Name" class="w-full p-4 bg-slate-100 rounded-2xl outline-none border-2 border-transparent focus:border-orange-500 font-bold">
                <textarea id="cust-address" placeholder="Complete Address (House No, Gali, Landmark)" class="w-full p-4 bg-slate-100 rounded-2xl outline-none border-2 border-transparent focus:border-orange-500 font-bold h-24"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-8">
                <button onclick="setPayment('COD')" id="btn-cod" class="pay-btn border-2 border-slate-100 p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all">💵 Cash on Delivery</button>
                <button onclick="setPayment('Online')" id="btn-online" class="pay-btn border-2 border-slate-100 p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all">📱 Pay via UPI</button>
            </div>

            <button onclick="confirmOrder()" id="final-order-btn" class="w-full bg-orange-500 text-white py-6 rounded-3xl font-black uppercase tracking-[0.2em] shadow-2xl active:scale-95 transition-all">Confirm Order 🚀</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDWHPt3Kya_s-9f62RsLfI_G1RgQU5P534",
            authDomain: "kfk-fish.firebaseapp.com",
            projectId: "kfk-fish",
            storageBucket: "kfk-fish.firebasestorage.app",
            messagingSenderId: "171442898165",
            appId: "1:171442898165:web:9234070d781b8138d4b1bc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentProduct = null;
        let selectedPayment = "";

        // Load Products
        async function loadMenu() {
            const container = document.getElementById('product-list');
            const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
            const snap = await getDocs(q);
            container.innerHTML = "";
            snap.forEach(doc => {
                const p = doc.data();
                const imgs = p.images || [p.image];
                container.innerHTML += `
                    <div class="product-card bg-white rounded-[2.5rem] overflow-hidden shadow-xl border border-slate-100">
                        <div class="relative overflow-x-auto flex snap-x snap-mandatory scrollbar-hide">
                            ${imgs.map(i => `<img src="${i}" class="w-full aspect-square object-cover snap-center flex-shrink-0">`).join('')}
                        </div>
                        <div class="p-6">
                            <h3 class="text-xl font-black text-slate-800 uppercase italic">${p.name}</h3>
                            <div class="flex justify-between items-center mt-4">
                                <span class="text-orange-500 font-black italic text-lg">₹${p.price} / ${p.weight}</span>
                                <button onclick="openCheckout('${p.name}', '${p.price}', '${p.weight}', '${imgs[0]}')" class="bg-[#002e6e] text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg">Order Now</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        window.openCheckout = (n, p, w, img) => {
            currentProduct = { n, p, w };
            document.getElementById('selected-item-info').innerHTML = `<img src="${img}" class="w-16 h-16 rounded-xl object-cover"><div class="flex-1"><p class="font-black text-slate-800 uppercase text-xs">${n}</p><p class="text-orange-500 font-bold text-xs">Total: ₹${p}</p></div>`;
            document.getElementById('checkout-modal').classList.remove('hidden');
        };

        window.closeCheckout = () => document.getElementById('checkout-modal').classList.add('hidden');

        window.setPayment = (m) => {
            selectedPayment = m;
            document.querySelectorAll('.pay-btn').forEach(b => b.classList.remove('border-orange-500', 'bg-orange-50'));
            document.getElementById('btn-' + (m === 'COD' ? 'cod' : 'online')).classList.add('border-orange-500', 'bg-orange-50');
        };

        window.confirmOrder = async () => {
            const name = document.getElementById('cust-name').value;
            const address = document.getElementById('cust-address').value;
            if(!name || !address || !selectedPayment) return alert("Pura address aur name daalein!");

            const btn = document.getElementById('final-order-btn');
            btn.disabled = true; btn.innerText = "PLACING ORDER...";

            try {
                // SAVE TO FIREBASE FOR ADMIN
                await addDoc(collection(db, "orders"), {
                    customerName: name,
                    address: address,
                    item: currentProduct.n,
                    price: currentProduct.p,
                    payment: selectedPayment,
                    status: "Pending",
                    createdAt: serverTimestamp()
                });

                // REDIRECT TO WHATSAPP
                const msg = `*NEW KFK ORDER*%0A*Item:* ${currentProduct.n}%0A*Price:* ₹${currentProduct.p}%0A*Address:* ${address}%0A*Name:* ${name}%0A*Mode:* ${selectedPayment}`;
                window.location.href = `https://wa.me/91XXXXXXXXXX?text=${msg}`;
            } catch (e) { alert("Error: " + e.message); btn.disabled = false; }
        };

        window.onload = loadMenu;
    </script>
</body>
</html>
