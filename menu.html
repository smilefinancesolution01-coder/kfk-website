<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK India | Live Fresh Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .cat-active { color: #e03546; border-bottom: 3px solid #e03546; font-weight: 800; }
        .product-card { border-bottom: 1px solid #f1f5f9; transition: 0.3s; }
        .product-card:hover { background: #fafafa; }
    </style>
</head>
<body class="bg-white text-slate-900">

    <header class="sticky top-0 z-[100] bg-white/90 backdrop-blur-md border-b px-6 py-5">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-[#e03546]">KFK<span class="text-slate-900">.INDIA</span></h1>
            <div id="cart-info" class="bg-slate-900 text-white px-5 py-2 rounded-2xl text-[10px] font-black uppercase">
                <span id="cart-count">0</span> Items
            </div>
        </div>
    </header>

    <nav class="sticky top-[73px] z-[90] bg-white border-b overflow-x-auto no-scrollbar py-4 px-6">
        <div id="category-tabs" class="max-w-5xl mx-auto flex gap-6 text-[11px] font-black uppercase tracking-widest">
            <button onclick="filterCat('all')" class="cat-btn cat-active" id="btn-all">All Collection</button>
            <button onclick="filterCat('river')" class="cat-btn" id="btn-river">River Fish</button>
            <button onclick="filterCat('sea')" class="cat-btn" id="btn-sea">Sea Food</button>
            <button onclick="filterCat('prawns')" class="cat-btn" id="btn-prawns">Prawns</button>
            <button onclick="filterCat('bengali')" class="cat-btn" id="btn-bengali">Bengali Cut</button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-10 mb-20">
        <div id="loading-state" class="text-center py-20 font-bold text-slate-400">Fetching Fresh Catch...</div>
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDWHPt3Kya_s-9f62RsLfI_G1RgQU5P534",
            authDomain: "kfk-fish.firebaseapp.com",
            projectId: "kfk-fish",
            storageBucket: "kfk-fish.firebasestorage.app",
            messagingSenderId: "171442898165",
            appId: "1:171442898165:web:9234070d781b8138d4b1bc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let allProducts = [];

        // 1. Firebase se data fetch karna
        async function fetchProducts() {
            try {
                const querySnapshot = await getDocs(collection(db, "products"));
                allProducts = [];
                querySnapshot.forEach((doc) => {
                    allProducts.push({ id: doc.id, ...doc.data() });
                });
                document.getElementById('loading-state').classList.add('hidden');
                renderUI(allProducts);
            } catch (error) {
                console.error("Error fetching products:", error);
            }
        }

        // 2. Data ko screen par dikhana
        window.renderUI = function(products) {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            
            if(products.length === 0) {
                list.innerHTML = '<p class="col-span-full text-center py-10 font-bold text-slate-300 uppercase">No products found in this category</p>';
                return;
            }

            products.forEach(p => {
                list.innerHTML += `
                    <div class="product-card flex justify-between gap-4 py-6">
                        <div class="flex-1">
                            <h3 class="text-lg font-black text-slate-800 uppercase tracking-tighter">${p.name}</h3>
                            <p class="text-sm font-bold text-slate-900 mt-1">₹${p.price}</p>
                            <p class="text-[10px] text-slate-400 mt-3 leading-relaxed uppercase font-bold tracking-widest italic">${p.category} | Freshly Processed</p>
                        </div>
                        <div class="relative w-28 h-28 flex-shrink-0">
                            <img src="${p.image}" class="w-full h-full object-cover rounded-2xl shadow-sm border border-slate-50">
                            <button class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-white text-[#e03546] border border-slate-100 px-6 py-1.5 rounded-xl text-[9px] font-black uppercase shadow-lg active:scale-90 transition-all">Add +</button>
                        </div>
                    </div>
                `;
            });
        }

        // 3. Category Filter Logic
        window.filterCat = function(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('cat-active'));
            document.getElementById('btn-' + cat).classList.add('cat-active');
            
            if(cat === 'all') {
                renderUI(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.category === cat);
                renderUI(filtered);
            }
        }

        // Start fetching on load
        fetchProducts();
    </script>
</body>
</html>
