<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Catch | KFK India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafafa; }
        .product-card { transition: all 0.4s ease; }
        .product-card:hover { transform: translateY(-10px); }
    </style>
</head>
<body>

    <header class="bg-[#002e6e] text-white p-10 rounded-b-[3.5rem] shadow-2xl text-center">
        <h1 class="text-4xl font-black italic tracking-tighter uppercase">KFK <span class="text-orange-500">FRESH</span></h1>
        <p class="text-blue-200 font-bold text-[10px] uppercase tracking-widest mt-2">Direct From Cloud Database</p>
    </header>

    <main class="p-6 lg:p-12">
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-20 text-slate-400 font-bold animate-pulse">
                LOADING FRESH STOCK...
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Aapka Same Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDWHPt3Kya_s-9f62RsLfI_G1RgQU5P534",
            authDomain: "kfk-fish.firebaseapp.com",
            projectId: "kfk-fish",
            storageBucket: "kfk-fish.firebasestorage.app",
            messagingSenderId: "171442898165",
            appId: "1:171442898165:web:9234070d781b8138d4b1bc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadMenu() {
            const container = document.getElementById('product-list');
            try {
                // Latest products sabse upar dikhane ke liye orderBy use kiya hai
                const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                
                if(snap.empty) {
                    container.innerHTML = `<div class="col-span-full text-center py-20 font-bold text-slate-400 uppercase">Aaj ka stock khatam ho gaya hai!</div>`;
                    return;
                }

                container.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    container.innerHTML += `
                        <div class="product-card bg-white rounded-[2.5rem] overflow-hidden shadow-xl border border-slate-100">
                            <div class="relative">
                                <img src="${p.image}" class="w-full aspect-square object-cover" alt="${p.name}">
                                <div class="absolute top-4 right-4 bg-orange-500 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Fresh</div>
                            </div>
                            <div class="p-6">
                                <h3 class="text-xl font-black text-slate-800 italic uppercase">${p.name}</h3>
                                <div class="flex justify-between items-center mt-4">
                                    <div class="flex flex-col">
                                        <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Price</span>
                                        <span class="text-orange-500 font-black italic">₹${p.price} / ${p.weight}</span>
                                    </div>
                                    <a href="https://wa.me/91XXXXXXXXXX?text=Hi, I want to order ${p.name}" class="bg-[#002e6e] text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-orange-500 transition-all shadow-lg">Order Now</a>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } catch (e) {
                console.error("Menu Load Error:", e);
                container.innerHTML = `<div class="col-span-full text-center py-20 text-red-400 font-bold">Error connecting to database. Please check rules.</div>`;
            }
        }

        window.onload = loadMenu;
    </script>
</body>
</html>
