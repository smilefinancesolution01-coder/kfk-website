<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK Mega Menu | 100+ Unique Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .product-card { transition: all 0.4s ease; border-radius: 2.5rem; overflow: hidden; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .category-btn.active { background: #002e6e; color: white; border-color: #002e6e; }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <header class="sticky top-0 z-[100] bg-white/90 backdrop-blur-md border-b border-gray-100 py-4">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-[#002e6e] italic tracking-tighter">KFK<span class="text-orange-500">.</span>MENU</a>
            <div class="flex items-center gap-4">
                <div class="relative bg-slate-100 p-3 rounded-2xl cursor-pointer" onclick="location.href='order.html'">
                    <span id="cart-counter" class="absolute -top-1 -right-1 bg-orange-600 text-white text-[9px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-[#002e6e]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                </div>
            </div>
        </div>
    </header>

    <section class="bg-[#002e6e] text-white py-12 text-center">
        <h1 class="text-4xl font-black italic uppercase">KFK Fresh <span class="text-orange-500">Inventory</span></h1>
        <p class="text-[10px] font-bold tracking-[0.4em] mt-2 opacity-70">100+ GOOGLE ANALYZED REAL SEAFOOD PRODUCTS</p>
    </section>

    <div class="sticky top-[73px] z-[90] bg-white border-b py-4 overflow-x-auto hide-scrollbar">
        <div class="max-w-7xl mx-auto px-6 flex gap-3">
            <button onclick="filterMenu('all')" class="category-btn active px-6 py-2.5 rounded-xl border text-[9px] font-black uppercase tracking-widest whitespace-nowrap">Show All</button>
            <button onclick="filterMenu('ready-to-eat')" class="category-btn px-6 py-2.5 rounded-xl border text-[9px] font-black uppercase tracking-widest whitespace-nowrap border-orange-500 text-orange-600">Ready To Eat (New)</button>
            <button onclick="filterMenu('prawns')" class="category-btn px-6 py-2.5 rounded-xl border text-[9px] font-black uppercase tracking-widest whitespace-nowrap">Prawns (25)</button>
            <button onclick="filterMenu('seafood')" class="category-btn px-6 py-2.5 rounded-xl border text-[9px] font-black uppercase tracking-widest whitespace-nowrap">Seafood (20)</button>
            <button onclick="filterMenu('snacks')" class="category-btn px-6 py-2.5 rounded-xl border text-[9px] font-black uppercase tracking-widest whitespace-nowrap">Snacks (32)</button>
            <button onclick="filterMenu('bengali')" class="category-btn px-6 py-2.5 rounded-xl border text-[9px] font-black uppercase tracking-widest whitespace-nowrap">Bengali Cut (21)</button>
        </div>
    </div>

    <section class="max-w-7xl mx-auto px-6 py-12">
        <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
        </div>
    </section>

    <script>
        const PEXELS_KEY = "kfzzPEicE21y0WcDJEMhLn0eUETxYReptyKIbwehcGdtGB3oW4Ka7xYj";
        
        let cartCount = JSON.parse(localStorage.getItem('kfk_cart'))?.length || 0;
        document.getElementById('cart-counter').innerText = cartCount;

        const db = [
            // READY TO EAT - HANDMADE & PACKED ITEMS
            ...["Handmade Fish Pickle", "Ghar ka Prawns Achar", "Ready-to-fry Bhetki Fillet", "Marinated Fish Tikka Pack", "Homemade Fish Curry Paste", "Dried Salted Fish", "Smoked River Fish", "Crispy Prawns Crackers", "Authentic Fish Masala Pack", "Ready-to-Steam Fish Patra"].map((name, i) => ({
                id: `rte${i}`, name, cat: 'ready-to-eat', price: 199 + (i*30), search: `homemade ${name} food packaging`, weight: '200g'
            })),

            // PRAWNS - 25 ITEMS
            ...["Tiger Prawns", "Jumbo King Prawns", "Pink Shrimp", "White Prawns", "Vannamei", "Scampi", "Cocktail Prawns", "Deep Sea Prawns", "Brown Shrimps", "Karavali Prawns", "Flower Shrimps", "Ghost Prawns", "Blue Shrimps", "Banana Prawns", "Red Claw Prawns", "Freshwater Gold Prawns", "Prawns Tail On", "Prawns Tail Off", "Deveined Prawns", "Minced Prawn Meat", "Small Shrimps", "Colossal Prawns", "Prawn Skewers", "Marinated Prawns", "Wild Caught Prawns"].map((name, i) => ({
                id: `p${i}`, name, cat: 'prawns', price: 450 + (i*10), search: `fresh raw ${name}`, weight: '500g'
            })),
            // SEAFOOD - 20 ITEMS
            ...["Silver Pomfret", "Black Pomfret", "Atlantic Salmon", "Surmai Steak", "Red Snapper", "Indian Mackerel", "Tuna Chunks", "Mud Crab", "Blue Crab", "Squid Rings", "Octopus", "Lobster Whole", "Bhetki Fillet", "Sea Bass", "Yellowfin Tuna", "Calamari", "Oysters Shell", "Baby Shark", "Leather Skin Fish", "Reef Cod"].map((name, i) => ({
                id: `s${i}`, name, cat: 'seafood', price: 700 + (i*25), search: `fresh ${name} seafood`, weight: '1kg'
            })),
            // SNACKS - 32 ITEMS
            ...["Fish Finger", "Salmon Burger", "Fish Tacos", "Fish Pakoda", "Fish Popcorn", "Fish Cutlet", "Fish Kebab", "Fish Nuggets", "Crispy Fish Strip", "Fish Fry Desi", "Crab Sticks", "Shrimp Tempura", "Fish Samosa", "Fish Momos", "Grill Fish Fillet", "Fish Tikka", "Amritsari Fish", "Fish Roll", "Fish Ball", "Fish Patty", "Fish Steak Fry", "Spicy Fish Bites", "Breaded Fish", "Lemon Butter Fish", "Chilli Fish", "Fish Manchurian", "Fish 65", "Butter Garlic Prawns", "Peri Peri Fish", "Tandoori Fish", "Fish Spring Roll", "Cheesy Fish snack"].map((name, i) => ({
                id: `sn${i}`, name, cat: 'snacks', price: 150 + (i*8), search: `cooked ${name} food`, weight: '250g'
            })),
            // BENGALI CUT - 21 ITEMS
            ...["Rohu Bengali Cut", "Catla Peti", "Ilish (Hilsa)", "Pabda Whole", "Tangra", "Parshe", "Bhetki Bengali", "Magur", "Singi", "Koi Fish", "Chital Muitha", "Aar Fish", "Boal Steak", "Small Mourala", "Batchua", "Pangash Cut", "Rupchanda", "Lotte Fish", "Kajoli", "Shol Fish", "Gurjali"].map((name, i) => ({
                id: `b${i}`, name, cat: 'bengali', price: 300 + (i*12), search: `raw ${name} fish`, weight: '500g'
            }))
        ];

        function addToCart(btn, name, price) {
            let cart = JSON.parse(localStorage.getItem('kfk_cart')) || [];
            cart.push({ name: name, price: price });
            localStorage.setItem('kfk_cart', JSON.stringify(cart));

            cartCount = cart.length;
            document.getElementById('cart-counter').innerText = cartCount;
            
            const originalText = btn.innerHTML;
            btn.innerHTML = "Added ✓";
            btn.className = "bg-green-600 text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase transition-all scale-105";
            
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.className = "bg-[#002e6e] text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest active:scale-95 transition-all";
            }, 800);
        }

        async function fetchImage(query, elementId) {
            try {
                const r = await fetch(`https://api.pexels.com/v1/search?query=${query}&per_page=1`, {
                    headers: { Authorization: PEXELS_KEY }
                });
                const d = await r.json();
                if(d.photos.length > 0) document.getElementById(elementId).src = d.photos[0].src.medium;
            } catch(e) {}
        }

        function renderMenu(filter = 'all') {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            const filtered = filter === 'all' ? db : db.filter(x => x.cat === filter);

            filtered.forEach(p => {
                const card = `
                    <div class="product-card bg-white border border-gray-100 shadow-sm flex flex-col">
                        <div class="h-44 overflow-hidden bg-slate-100">
                            <img id="img-${p.id}" class="w-full h-full object-cover" src="https://via.placeholder.com/400x300?text=KFK+Fresh">
                        </div>
                        <div class="p-5 flex-1 flex flex-col">
                            <span class="text-[8px] font-black text-orange-500 uppercase tracking-widest">${p.cat}</span>
                            <h3 class="text-sm font-black text-[#002e6e] mt-1 mb-4 leading-tight h-10 overflow-hidden">${p.name}</h3>
                            <div class="mt-auto flex justify-between items-center">
                                <span class="text-lg font-black text-slate-800">₹${p.price}</span>
                                <button onclick="addToCart(this, '${p.name}', ${p.price})" class="bg-[#002e6e] text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest active:scale-95 transition-all">Add to Cart</button>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
                fetchImage(p.search, `img-${p.id}`);
            });
        }

        function filterMenu(cat) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            if(window.event) window.event.target.classList.add('active');
            renderMenu(cat);
        }

        renderMenu();
    </script>
</body>
</html>
