<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK Full Menu | 100+ Varieties</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f8fafc]">
    <header class="bg-[#002e6e] text-white py-10 text-center">
        <h1 class="text-4xl font-black italic uppercase italic">The Mega Menu</h1>
        <p class="text-[10px] font-bold tracking-[0.4em] mt-2">100+ PREMIUM FISH & SEAFOOD PRODUCTS</p>
    </header>

    <div class="max-w-7xl mx-auto px-6 py-12">
        <div class="flex gap-4 overflow-x-auto hide-scrollbar mb-12 pb-4">
            <button class="bg-[#002e6e] text-white px-8 py-3 rounded-xl text-[10px] font-black uppercase">All</button>
            <button class="bg-white border px-8 py-3 rounded-xl text-[10px] font-black uppercase">Prawns (25)</button>
            <button class="bg-white border px-8 py-3 rounded-xl text-[10px] font-black uppercase">Seafood (20)</button>
            <button class="bg-white border px-8 py-3 rounded-xl text-[10px] font-black uppercase">Snacks (32)</button>
            <button class="bg-white border px-8 py-3 rounded-xl text-[10px] font-black uppercase">Bengali Cut (21)</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-8" id="menu-grid">
            </div>
    </div>

    <script>
        const products = [
            // PRAWNS (25 products)
            ...Array.from({length: 25}, (_, i) => ({name: `Premium Prawn Type ${i+1}`, price: 499 + (i*20), cat: 'Prawns', img: 'https://images.pexels.com/photos/566344/pexels-photo-566344.jpeg'})),
            // SNACKS (32 products)
            ...Array.from({length: 32}, (_, i) => ({name: `Fish Snack Item ${i+1}`, price: 129 + (i*10), cat: 'Snacks', img: 'https://images.pexels.com/photos/1103909/pexels-photo-1103909.jpeg'})),
            // BENGALI CUT (21 products)
            ...Array.from({length: 21}, (_, i) => ({name: `Bengali Cut Fish ${i+1}`, price: 380 + (i*15), cat: 'Bengali Cut', img: 'https://images.pexels.com/photos/229789/pexels-photo-229789.jpeg'})),
            // SEAFOOD (20 products)
            ...Array.from({length: 20}, (_, i) => ({name: `Global Seafood ${i+1}`, price: 800 + (i*50), cat: 'Seafood', img: 'https://images.pexels.com/photos/714903/pexels-photo-714903.jpeg'}))
        ];

        const grid = document.getElementById('menu-grid');
        products.forEach(p => {
            grid.innerHTML += `
                <div class="bg-white p-5 rounded-[2.5rem] shadow-sm border border-gray-100 hover:shadow-xl transition-all">
                    <img src="${p.img}" class="w-full h-40 object-cover rounded-[2rem] mb-4">
                    <span class="text-[8px] font-black text-orange-500 uppercase tracking-widest">${p.cat}</span>
                    <h3 class="font-black text-sm text-[#002e6e] mt-1">${p.name}</h3>
                    <div class="flex justify-between items-center mt-4">
                        <span class="font-black text-lg">₹${p.price}</span>
                        <button class="bg-[#002e6e] text-white px-4 py-2 rounded-lg text-[9px] font-black">ADD</button>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
