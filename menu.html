<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Menu | KFK India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafafa; }
        .product-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .product-card:hover { transform: translateY(-10px); }
        .category-pill.active { background: #002e6e; color: white; }
    </style>
</head>
<body>

    <header class="bg-[#002e6e] text-white p-8 rounded-b-[3rem] shadow-2xl overflow-hidden relative">
        <div class="relative z-10 text-center max-w-2xl mx-auto">
            <h1 class="text-4xl font-black italic tracking-tighter uppercase">Fresh Catch <span class="text-orange-500">Today</span></h1>
            <p class="text-blue-200 font-bold text-[10px] uppercase tracking-[0.3em] mt-2">Direct from the coast to your kitchen</p>
        </div>
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/5 rounded-full"></div>
    </header>

    <div class="flex gap-3 p-6 overflow-x-auto no-scrollbar justify-center">
        <button onclick="filterItems('All')" class="category-pill active px-6 py-3 rounded-2xl bg-white border border-slate-100 shadow-sm font-bold text-xs whitespace-nowrap">All Items</button>
        <button onclick="filterItems('Fresh Water')" class="category-pill px-6 py-3 rounded-2xl bg-white border border-slate-100 shadow-sm font-bold text-xs whitespace-nowrap">Fresh Water</button>
        <button onclick="filterItems('Sea Food')" class="category-pill px-6 py-3 rounded-2xl bg-white border border-slate-100 shadow-sm font-bold text-xs whitespace-nowrap">Sea Food</button>
        <button onclick="filterItems('Dry Fish')" class="category-pill px-6 py-3 rounded-2xl bg-white border border-slate-100 shadow-sm font-bold text-xs whitespace-nowrap">Dry Fish</button>
    </div>

    <main class="p-6 lg:p-12">
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-20">
                <div class="animate-spin text-4xl mb-4">🔄</div>
                <p class="font-black text-slate-400 uppercase tracking-widest text-xs">Fetching Today's Fresh Arrivals...</p>
            </div>
        </div>
    </main>

    <script>
        const SCRIPT_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL"; // Wahi URL yahan bhi daalein
        let allProducts = [];

        async function fetchMenu() {
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getProducts`);
                allProducts = await response.json();
                renderProducts(allProducts);
            } catch (e) {
                document.getElementById('product-list').innerHTML = `<p class="col-span-full text-center text-red-500 font-bold">Failed to load menu. Check Script URL.</p>`;
            }
        }

        function renderProducts(products) {
            const container = document.getElementById('product-list');
            if(products.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center py-20 text-slate-400 font-bold uppercase tracking-widest">No stock available today.</p>`;
                return;
            }

            container.innerHTML = products.map(product => `
                <div class="product-card bg-white rounded-[2.5rem] overflow-hidden shadow-xl shadow-slate-200/50 border border-slate-100 group">
                    <div class="relative aspect-square overflow-hidden bg-slate-100">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-110 transition-all duration-500">
                        <div class="absolute top-4 right-4 bg-white/90 backdrop-blur px-3 py-1.5 rounded-xl font-black text-[10px] text-[#002e6e] uppercase tracking-widest">
                            ${product.category}
                        </div>
                    </div>
                    
                    <div class="p-6">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-xl font-black text-slate-800 italic uppercase tracking-tighter">${product.name}</h3>
                            <span class="text-orange-500 font-black italic">₹${product.price}</span>
                        </div>
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-6">Pack: ${product.weight}</p>
                        
                        <button onclick="addToCart('${product.name}', ${product.price})" class="w-full bg-[#002e6e] text-white py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg shadow-blue-100 hover:bg-orange-500 transition-all active:scale-95">
                            Add to Order
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function filterItems(category) {
            // Update Active Pill UI
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText === category || (category === 'All' && btn.innerText === 'All Items')) {
                    btn.classList.add('active');
                }
            });

            if(category === 'All') {
                renderProducts(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.category === category);
                renderProducts(filtered);
            }
        }

        // Add to Cart Logic (Local Storage or Direct WhatsApp)
        function addToCart(name, price) {
            alert(name + " added! (Aap yahan apna WhatsApp Order logic bhi daal sakte hain)");
        }

        window.onload = fetchMenu;
    </script>
</body>
</html>
