<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK India | Fish Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .cat-active { background: #e03546; color: white; }
        /* Image fix: Ensures image always fits the box */
        .fish-img-box { width: 120px; height: 120px; overflow: hidden; border-radius: 12px; position: relative; background: #f3f4f6; }
        .fish-img-box img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-white font-sans">

    <header class="p-4 border-b sticky top-0 bg-white z-50">
        <div class="max-w-xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-[#e03546]">KFK INDIA</h1>
            <div id="cart-count" class="bg-black text-white px-3 py-1 rounded-full text-xs">0 Items</div>
        </div>
    </header>

    <nav class="p-3 border-b overflow-x-auto no-scrollbar flex gap-3 sticky top-[61px] bg-white z-40">
        <button onclick="renderMenu('river')" class="cat-btn px-4 py-2 rounded-full border text-xs font-bold whitespace-nowrap" id="btn-river">River Fish</button>
        <button onclick="renderMenu('sea')" class="cat-btn px-4 py-2 rounded-full border text-xs font-bold whitespace-nowrap" id="btn-sea">Sea Food</button>
        <button onclick="renderMenu('prawns')" class="cat-btn px-4 py-2 rounded-full border text-xs font-bold whitespace-nowrap" id="btn-prawns">Prawns</button>
        <button onclick="renderMenu('bengali')" class="cat-btn px-4 py-2 rounded-full border text-xs font-bold whitespace-nowrap" id="btn-bengali">Bengali Cut</button>
    </nav>

    <main id="menu-container" class="p-4 max-w-xl mx-auto mb-20">
        </main>

    <script>
        // Yahan har category ki ek standard image link hai
        // Agar aapki apni photo hai to 'image' ki jagah uska naam likhein (e.g., 'rohu.jpg')
        const categories = {
            river: { name: "River Fish", image: "https://placehold.co/400x400/e03546/white?text=Fresh+River+Fish" },
            sea: { name: "Sea Food", image: "https://placehold.co/400x400/2d3436/white?text=Sea+Food" },
            prawns: { name: "Prawns", image: "https://placehold.co/400x400/fab1a0/black?text=Fresh+Prawns" },
            bengali: { name: "Bengali Cut", image: "https://placehold.co/400x400/fdcb6e/black?text=Bengali+Fish" }
        };

        const fishNames = ["Rohu", "Catla", "Hilsa", "Prawns Jumbo", "Pomfret", "Surmai", "Basa Fillet"];

        function renderMenu(catKey) {
            // Update Active Tab
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('cat-active'));
            document.getElementById('btn-' + catKey).classList.add('cat-active');

            const container = document.getElementById('menu-container');
            container.innerHTML = "";

            // 50 items per category (Total 200 items logic)
            for(let i=1; i<=50; i++) {
                let name = fishNames[i % fishNames.length] + " - " + categories[catKey].name;
                container.innerHTML += `
                    <div class="flex justify-between items-center py-4 border-b">
                        <div class="flex-1 pr-4">
                            <h3 class="font-bold text-gray-800">${name} (${i})</h3>
                            <p class="text-xs text-gray-400 mt-1">Freshly cleaned and ready to cook.</p>
                            <p class="mt-2 font-bold text-red-600">₹${200 + (i*5)}</p>
                        </div>
                        <div class="fish-img-box">
                            <img src="${categories[catKey].image}" alt="fish">
                            <button class="absolute bottom-1 left-1/2 -translate-x-1/2 bg-white text-red-600 border border-red-200 px-4 py-1 rounded shadow-lg text-[10px] font-bold">ADD</button>
                        </div>
                    </div>
                `;
            }
        }

        // Default Load
        renderMenu('river');
    </script>
</body>
</html>
