<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK India | Official Fish Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; background-color: #fff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .category-btn.active { background: #e03546; color: white; border-color: #e03546; font-weight: 800; }
        .product-card { border-bottom: 1px solid #f1f5f9; padding: 1.5rem 0; display: flex; justify-content: space-between; gap: 1rem; }
        .product-card:last-child { border-bottom: none; }
        .cart-drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .veg-icon { width: 14px; height: 14px; border: 1.5px solid #d32f2f; display: flex; align-items: center; justify-content: center; }
        .veg-dot { width: 6px; height: 6px; background: #d32f2f; border-radius: 50%; }
    </style>
</head>
<body class="text-slate-800">

    <header class="sticky top-0 z-[100] bg-white/95 backdrop-blur-md border-b border-slate-100 px-4 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-[#e03546] tracking-tighter">KFK<span class="text-slate-900">.INDIA</span></h1>
            <button onclick="toggleCart()" class="bg-slate-900 text-white px-5 py-2.5 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2">
                <span id="cart-count">0</span> Items in Cart
            </button>
        </div>
    </header>

    <nav class="sticky top-[72px] z-[90] bg-white border-b overflow-x-auto no-scrollbar py-4 px-4 shadow-sm">
        <div id="category-bar" class="max-w-4xl mx-auto flex gap-4 whitespace-nowrap text-[11px] font-black uppercase tracking-widest">
            </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-8 mb-24">
        <div id="product-list" class="space-y-4">
            </div>
    </main>

    <div id="bottom-bar" class="fixed bottom-0 left-0 w-full bg-white border-t p-4 hidden shadow-[0_-10px_30px_rgba(0,0,0,0.08)] z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div>
                <p id="bar-total" class="text-xl font-black text-slate-900">₹0</p>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Extra GST may apply</p>
            </div>
            <button onclick="toggleCart()" class="bg-[#e03546] text-white px-10 py-4 rounded-2xl font-black uppercase text-[11px] tracking-[0.2em] shadow-lg shadow-red-200">View Cart</button>
        </div>
    </div>

    <div id="cart-overlay" class="fixed inset-0 bg-slate-900/60 z-[200] hidden backdrop-blur-sm" onclick="toggleCart()"></div>
    <div id="cart-drawer" class="fixed right-0 top-0 h-full w-full max-w-md bg-white z-[201] cart-drawer translate-x-full flex flex-col shadow-2xl">
        <div class="p-8 border-b flex justify-between items-center">
            <h2 class="text-2xl font-black italic uppercase text-slate-900 tracking-tighter">Your Basket</h2>
            <button onclick="toggleCart()" class="text-3xl text-slate-300 hover:text-red-500">&times;</button>
        </div>
        
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50">
            </div>

        <div class="p-8 border-t bg-white space-y-6">
            <div class="space-y-3">
                <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Delivery Address</p>
                <input type="text" id="address" placeholder="Flat No. / Street / Landmark" class="w-full p-4 bg-slate-100 rounded-2xl outline-none text-sm border-2 border-transparent focus:border-red-500 transition-all">
            </div>
            <div class="flex justify-between items-center">
                <span class="text-slate-400 font-bold">To Pay</span>
                <span id="grand-total" class="text-3xl font-black text-slate-900">₹0</span>
            </div>
            <button onclick="checkout()" class="w-full bg-[#e03546] text-white py-5 rounded-2xl font-black uppercase text-xs tracking-[0.3em] shadow-xl active:scale-95 transition-all">Complete Order</button>
        </div>
    </div>

    <script>
        const categories = [
            { id: 'rte', name: 'Ready to Eat' },
            { id: 'river', name: 'River Fish' },
            { id: 'sea', name: 'Sea Food' },
            { id: 'prawns', name: 'Prawns' },
            { id: 'boneless', name: 'Boneless' },
            { id: 'bengali', name: 'Bengali Cut' },
            { id: 'snacks', name: 'Fish Snacks' }
        ];

        // Specific Fish Items for each category
        const fishNames = {
            rte: ["Kerala Fish Curry", "Goan Fish Curry", "Fish Tikka Gravy", "Fish Moilee", "Macher Jhol", "Chettinad Fish Roast"],
            river: ["Fresh Rohu", "Catla Steaks", "Pabda Whole", "Tangra Fresh", "Magur River", "Boal Cut"],
            sea: ["White Pomfret", "Surmai (King Fish)", "Red Snapper", "Indian Mackerel", "Atlantic Salmon", "Sea Bass"],
            prawns: ["Tiger Prawns", "King Prawns", "White Shrimps", "Vannamei Prawns", "Cocktail Prawns"],
            boneless: ["Bhetki Fillet", "Basa Fillet", "Salmon Steaks", "Tuna Chunks", "Surmai Boneless"],
            bengali: ["Padma Ilish", "Chital Muitha", "Parshe Cut", "Koi Fish", "Kajoli Whole"],
            snacks: ["Fish Fingers", "Fish Pakora", "Fish Cutlet", "Amritsari Fish", "Fish Popcorn"]
        };

        const imagePool = {
            rte: "https://www.tastynibbles.in/cdn/shop/products/FishCurrywithCoconutMilk1_360x.jpg",
            river: "https://5.imimg.com/data5/ANDROID/Default/2021/1/HX/OL/DU/119931758/product-jpeg-500x500.jpg",
            sea: "https://www.licious.in/blog/wp-content/uploads/2022/03/shutterstock_1124623700.jpg",
            prawns: "https://5.imimg.com/data5/SELLER/Default/2022/11/NL/NP/GC/116964177/tiger-prawn-fish-500x500.jpeg",
            boneless: "https://5.imimg.com/data5/SELLER/Default/2023/1/LN/MY/DQ/53112284/fresh-boneless-bhetki-fish-fillet-500x500.jpeg",
            bengali: "https://5.imimg.com/data5/SELLER/Default/2021/10/TC/ZB/FY/39290072/paddmar-ilish-fish-500x500.jpg",
            snacks: "https://5.imimg.com/data5/ANDROID/Default/2022/9/OW/YA/IE/15915523/product-jpeg-500x500.jpg"
        };

        let inventory = [];
        let cart = [];

        function buildInventory() {
            let id = 1;
            categories.forEach(c => {
                // Har category mein ~30 items generate kar rahe hain (Total 200+)
                for(let i=0; i<30; i++) {
                    let base = fishNames[c.id][i % fishNames[c.id].length];
                    inventory.push({
                        id: id++,
                        name: i === 0 ? base : `${base} (Pack ${i+1})`,
                        catId: c.id,
                        price: 180 + (Math.floor(Math.random() * 80) * 10),
                        weight: i % 2 === 0 ? "500g" : "1kg",
                        img: imagePool[c.id],
                        desc: `Freshly processed ${base} sourced daily. No preservatives, 100% natural fish.`
                    });
                }
            });
        }

        function renderTabs() {
            const bar = document.getElementById('category-bar');
            categories.forEach(c => {
                bar.innerHTML += `<button id="tab-${c.id}" onclick="showCat('${c.id}')" class="category-btn border-b-2 border-transparent pb-1 transition-all">${c.name}</button>`;
            });
        }

        function showCat(catId) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active', 'border-[#e03546]'));
            document.getElementById(`tab-${catId}`).classList.add('active', 'border-[#e03546]');

            const list = document.getElementById('product-list');
            list.innerHTML = '';

            const filtered = inventory.filter(p => p.catId === catId);
            filtered.forEach(p => {
                list.innerHTML += `
                    <div class="product-card">
                        <div class="flex-1">
                            <div class="veg-icon mb-2"><div class="veg-dot"></div></div>
                            <h3 class="text-base font-bold text-slate-900">${p.name}</h3>
                            <p class="text-sm font-black text-slate-800 mt-1">₹${p.price}</p>
                            <p class="text-xs text-slate-400 mt-2 leading-relaxed h-8 overflow-hidden line-clamp-2">${p.desc}</p>
                            <span class="inline-block mt-3 text-[9px] font-black bg-slate-100 px-2 py-1 rounded text-slate-500 uppercase tracking-widest">${p.weight}</span>
                        </div>
                        <div class="relative w-32 h-32 flex-shrink-0">
                            <img src="${p.img}" class="w-full h-full object-cover rounded-2xl shadow-sm border border-slate-50">
                            <button onclick="addToCart(${p.id})" class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-white text-[#e03546] border border-slate-200 shadow-xl px-7 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-red-50 active:scale-90 transition-all">Add</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(pid) {
            const item = inventory.find(x => x.id === pid);
            cart.push({...item, cartId: Date.now()});
            updateCart();
            document.getElementById('bottom-bar').classList.remove('hidden');
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.length ? '' : '<p class="text-center py-20 text-slate-300 font-bold uppercase text-xs">Your basket is empty</p>';
            
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <div class="flex items-center gap-4">
                            <img src="${item.img}" class="w-12 h-12 rounded-xl object-cover">
                            <div>
                                <h4 class="text-[10px] font-black uppercase text-slate-800 leading-tight">${item.name}</h4>
                                <p class="text-[10px] font-bold text-slate-400 mt-1">₹${item.price} • ${item.weight}</p>
                            </div>
                        </div>
                        <button onclick="removeFromCart(${item.cartId})" class="text-slate-300 hover:text-red-500 font-black text-xl px-2">&times;</button>
                    </div>
                `;
            });
            document.getElementById('grand-total').innerText = `₹${total}`;
            document.getElementById('bar-total').innerText = `₹${total}`;
        }

        function removeFromCart(cid) {
            cart = cart.filter(x => x.cartId !== cid);
            updateCart();
            if(!cart.length) document.getElementById('bottom-bar').classList.add('hidden');
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('translate-x-full');
            document.getElementById('cart-overlay').classList.toggle('hidden');
        }

        function checkout() {
            const addr = document.getElementById('address').value;
            const total = document.getElementById('grand-total').innerText.replace('₹','');
            if(!addr || cart.length === 0) return alert("Please add items and delivery address!");
            // Redirect to UPI
            window.location.href = `upi://pay?pa=kolka97560@barodampay&pn=KFK_INDIA&am=${total}&cu=INR&tn=KFK_Fish_Order`;
        }

        // Initialize
        buildInventory();
        renderTabs();
        showCat('rte'); // Default category
    </script>
</body>
</html>
