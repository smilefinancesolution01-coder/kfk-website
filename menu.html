<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | KFK India - Fresh Fish, Meat & More</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .category-pill:hover { background-color: #f97316; color: white; border-color: #f97316; }
        .product-card { border: 1px solid #f3f4f6; transition: all 0.3s ease; }
        .product-card:hover { border-color: #f97316; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); }
        .break-word { overflow-wrap: break-word; word-wrap: break-word; word-break: break-word; }
        .sticky-filter { position: sticky; top: 80px; z-index: 40; }
    </style>
</head>
<body class="bg-gray-50 text-slate-900">

    <header class="sticky top-0 z-[100] bg-white/95 backdrop-blur-md border-b">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <a href="index.html" class="text-3xl font-extrabold text-[#002e6e] italic">KFK<span class="text-orange-500">.</span>INDIA</a>
            <div class="flex gap-4">
                <a href="order.html" class="relative p-2 bg-gray-100 rounded-full">
                    <span class="absolute -top-1 -right-1 bg-orange-600 text-white text-[9px] w-5 h-5 flex items-center justify-center rounded-full border-2 border-white">0</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                </a>
            </div>
        </div>
    </header>

    <section class="bg-white border-b sticky top-20 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex gap-3 overflow-x-auto no-scrollbar">
            <button class="category-pill whitespace-nowrap px-6 py-2 rounded-full border border-gray-200 text-xs font-bold uppercase tracking-widest bg-orange-500 text-white">All Products</button>
            <button class="category-pill whitespace-nowrap px-6 py-2 rounded-full border border-gray-200 text-xs font-bold uppercase tracking-widest text-slate-500 bg-white">Fresh Fish</button>
            <button class="category-pill whitespace-nowrap px-6 py-2 rounded-full border border-gray-200 text-xs font-bold uppercase tracking-widest text-slate-500 bg-white">Mutton</button>
            <button class="category-pill whitespace-nowrap px-6 py-2 rounded-full border border-gray-200 text-xs font-bold uppercase tracking-widest text-slate-500 bg-white">Chicken</button>
            <button class="category-pill whitespace-nowrap px-6 py-2 rounded-full border border-gray-200 text-xs font-bold uppercase tracking-widest text-slate-500 bg-white">Prawns</button>
            <button class="category-pill whitespace-nowrap px-6 py-2 rounded-full border border-gray-200 text-xs font-bold uppercase tracking-widest text-slate-500 bg-white">Ready to Cook</button>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
            <script>
                // Product Data matching Reference Style
                const products = [
                    { id: 1, name: "Premium Rohu Fish - Large (Cleaned)", price: 428, oldPrice: 519, weight: "500 gm", query: "rohu fish cleaned", tag: "Best Seller" },
                    { id: 2, name: "Fresh Tengra Fish (Small)", price: 380, oldPrice: 450, weight: "250 gm", query: "tengra fish", tag: "Fresh" },
                    { id: 3, name: "Mutton Curry Cut (Fatless)", price: 849, oldPrice: 999, weight: "500 gm", query: "raw mutton meat", tag: "Premium" },
                    { id: 4, name: "Country Chicken - Skinless", price: 320, oldPrice: 400, weight: "1 kg", query: "raw country chicken", tag: "Antibiotic Free" },
                    { id: 5, name: "Jumbo King Prawns", price: 699, oldPrice: 850, weight: "250 gm", query: "jumbo prawns", tag: "Sea Fresh" },
                    { id: 6, name: "Hilsa (Ilish) - Padma River", price: 1899, oldPrice: 2200, weight: "1 kg", query: "hilsa fish raw", tag: "Seasonal" },
                    { id: 7, name: "Chicken Wings (Marinated)", price: 299, oldPrice: 350, weight: "500 gm", query: "chicken wings marinated", tag: "Ready to Cook" },
                    { id: 8, name: "Catla Fish - Bengali Cut", price: 450, oldPrice: 520, weight: "500 gm", query: "catla fish cleaned", tag: "Daily Catch" },
                    { id: 9, name: "Lean Goat Mutton Chops", price: 950, oldPrice: 1100, weight: "500 gm", query: "mutton chops raw", tag: "Must Try" },
                    { id: 10, name: "Pomfret - White (Large)", price: 750, oldPrice: 900, weight: "2 pcs", query: "white pomfret fish", tag: "Sea Food" },
                    { id: 11, name: "Boneless Chicken Breast", price: 280, oldPrice: 350, weight: "500 gm", query: "chicken breast boneless", tag: "Gym Diet" },
                    { id: 12, name: "River Prawns (Golda Chingri)", price: 1200, oldPrice: 1500, weight: "500 gm", query: "golda chingri", tag: "Premium" }
                ];

                products.forEach((p, i) => {
                    document.write(`
                        <div class="product-card bg-white rounded-3xl p-3 md:p-5 flex flex-col justify-between">
                            <div>
                                <div class="relative aspect-square rounded-2xl overflow-hidden bg-gray-50 mb-4">
                                    <img id="img-${i}" class="w-full h-full object-cover hover:scale-110 transition duration-500" src="" alt="${p.name}">
                                    <span class="absolute top-2 left-2 bg-black/70 backdrop-blur-md text-white text-[8px] font-black px-2 py-1 rounded-full uppercase italic tracking-widest">${p.tag}</span>
                                </div>
                                <h3 class="text-sm md:text-base font-bold text-slate-800 leading-tight h-10 overflow-hidden break-word">${p.name}</h3>
                                <p class="text-[10px] font-black text-slate-400 uppercase mt-2 tracking-widest">${p.weight}</p>
                            </div>
                            
                            <div class="mt-6">
                                <div class="flex items-center gap-2 mb-4">
                                    <span class="text-lg md:text-xl font-black text-[#002e6e]">₹${p.price}</span>
                                    <span class="text-[11px] line-through text-slate-300 font-bold italic">₹${p.oldPrice}</span>
                                </div>
                                <button onclick="location.href='order.html'" class="w-full bg-[#002e6e] text-white py-3 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-orange-500 transition-all shadow-lg shadow-blue-900/10">Add to Cart</button>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div>
    </main>

    <footer class="bg-[#002e6e] text-white pt-20 pb-10 px-6">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-12 border-b border-white/10 pb-16">
            <div>
                <h2 class="text-3xl font-black italic mb-6">KFK<span class="text-orange-500">.</span>INDIA</h2>
                <p class="text-slate-400 text-[10px] font-bold uppercase leading-loose break-word">Premium quality meat and seafood delivery.</p>
            </div>
            <div>
                <h6 class="text-orange-500 font-black text-[10px] uppercase mb-8">Categories</h6>
                <ul class="text-[11px] font-bold space-y-4 uppercase text-slate-300">
                    <li><a href="menu.html">Fish & Seafood</a></li>
                    <li><a href="menu.html">Poultry & Chicken</a></li>
                    <li><a href="menu.html">Mutton & Goat</a></li>
                </ul>
            </div>
            <div>
                <h6 class="text-orange-500 font-black text-[10px] uppercase mb-8">Pages</h6>
                <ul class="text-[11px] font-bold space-y-4 uppercase text-slate-300">
                    <li><a href="about.html">Our Story</a></li>
                    <li><a href="franchise.html">Franchise</a></li>
                    <li><a href="compliance.html">Certificates</a></li>
                </ul>
            </div>
            <div>
                <h6 class="text-orange-500 font-black text-[10px] uppercase mb-8">Contact</h6>
                <ul class="text-[11px] font-bold space-y-4 uppercase text-slate-300">
                    <li><a href="contact.html">Support Center</a></li>
                    <li><a href="locations.html">Store Hubs</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script>
        const API_KEY = "kfzzPEicE21y0WcDJEMhLn0eUETxYReptyKIbwehcGdtGB3oW4Ka7xYj";
        
        async function loadImages() {
            try {
                for(let i=0; i<products.length; i++) {
                    const res = await fetch(`https://api.pexels.com/v1/search?query=${products[i].query}&per_page=1`, {
                        headers: { Authorization: API_KEY }
                    });
                    const data = await res.json();
                    if(data.photos.length > 0) {
                        document.getElementById(`img-${i}`).src = data.photos[0].src.large;
                    }
                }
            } catch (err) { console.error(err); }
        }
        loadImages();
    </script>
</body>
</html>
