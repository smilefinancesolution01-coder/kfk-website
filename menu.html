<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK India | Official Seafood Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; background-color: #fff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .category-btn.active { background: #e03546; color: white; border-color: #e03546; font-weight: 800; }
        .product-card { border-bottom: 1px solid #f3f4f6; padding: 1.5rem 0; display: flex; justify-content: space-between; gap: 1rem; }
        .product-card:last-child { border-bottom: none; }
        .cart-drawer { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="text-slate-800">

    <header class="sticky top-0 z-[100] bg-white border-b border-gray-100 px-4 py-4">
        <div class="max-w-4xl mx-auto px-2 flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-[#e03546]">KFK<span class="text-slate-900">.INDIA</span></h1>
            <button onclick="toggleCart()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 hover:bg-orange-600 transition-all">
                <span id="cart-count">0</span> Items
            </button>
        </div>
    </header>

    <nav class="sticky top-[72px] z-[90] bg-white border-b py-3 px-4 shadow-sm no-scrollbaroverflow-x-auto overflow-x-auto no-scrollbar">
        <div id="category-bar" class="max-w-4xl mx-auto flex gap-4 whitespace-nowrap text-[11px] font-black uppercase tracking-widest">
            </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 py-8 mb-24 relative">
        <div id="product-list" class="space-y-4">
            </div>
    </main>

    <div id="bottom-bar" class="fixed bottom-0 left-0 w-full bg-white border-t p-4 hidden shadow-[0_-10px_20px_rgba(0,0,0,0.05)] z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <p id="bar-total" class="text-xl font-black italic text-slate-900">₹0</p>
            <button onclick="toggleCart()" class="bg-[#e03546] text-white px-10 py-3.5 rounded-2xl font-black uppercase text-xs tracking-widest">View Cart</button>
        </div>
    </div>

    <div id="cart-overlay" class="fixed inset-0 bg-black/60 z-[200] hidden backdrop-blur-sm" onclick="toggleCart()"></div>
    <div id="cart-drawer" class="fixed right-0 top-0 h-full w-full max-w-md bg-white z-[201] cart-drawer translate-x-full flex flex-col shadow-2xl">
        <div class="p-8 border-b flex justify-between items-center">
            <h2 class="text-2xl font-black italic uppercase text-slate-900 tracking-tighter">Your Order</h2>
            <button onclick="toggleCart()" class="text-3xl text-slate-300 hover:text-red-500 transition-all">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4 bg-slate-50"></div>
        <div class="p-8 border-t bg-white space-y-6">
            <div class="space-y-3">
                <p class="text-[10px] font-black uppercase text-slate-400 tracking-widest">Delivery Details</p>
                <input type="text" id="house-no" placeholder="Flat No. / Street / Landmark" class="w-full p-4 bg-slate-100 rounded-2xl outline-none text-sm border-2 border-transparent focus:border-red-500 transition-all">
                <input type="text" id="area-details" placeholder="Area / Sector / City" class="w-full p-4 bg-slate-100 rounded-2xl outline-none text-sm border-2 border-transparent focus:border-red-500 transition-all">
            </div>
            <div class="flex justify-between font-bold text-lg"><span>Grand Total</span><span id="grand-total">₹0</span></div>
            <button onclick="checkout()" class="w-full bg-[#e03546] text-white py-5 rounded-2xl font-black uppercase text-xs tracking-[0.2em]shadow-xl active:scale-95 transition-all">Proceed to UPI Pay</button>
        </div>
    </div>

    <script>
        const UPI_ID = "kolka97560@barodampay";

        const categories = [
            { id: 'rte', name: 'Ready to Eat' },
            { id: 'river', name: 'River Fish' },
            { id: 'sea', name: 'Sea Food' },
            { id: 'prawns', name: 'Prawns' },
            { id: 'boneless', name: 'Boneless' },
            { id: 'bengali', name: 'Bengali Cut' },
            { id: 'snacks', name: 'Fish Snacks' }
        ];

        // --- GOOGLE ANALYZED FIXED REAL IMAGE POOL ---
        // Maine specific images ke links manually verify karke daale hain.
        const imagePool = {
            rte: "https://www.thespruceeats.com/thmb/XN_v-w_wR19T6Vb7M2b7QzQ9Z3E=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/fish-tikka-masala-recipe-1951566-hero-01-5c6e864146e0fb00018f6e86.jpg",
            river: "https://freshlist.in/image/cache/catalog/pabda-500x500.jpg",
            sea: "https://5.imimg.com/data5/ANDROID/Default/2022/9/HT/RE/FE/133177969/product-jpeg-500x500.jpg",
            prawns: "https://5.imimg.com/data5/SELLER/Default/2022/11/NL/NP/GC/116964177/tiger-prawn-fish-500x500.jpeg",
            boneless: "https://5.imimg.com/data5/SELLER/Default/2023/1/LN/MY/DQ/53112284/fresh-boneless-bhetki-fish-fillet-500x500.jpeg",
            bengali: "https://5.imimg.com/data5/SELLER/Default/2021/10/TC/ZB/FY/39290072/paddmar-ilish-fish-500x500.jpg",
            snacks: "https://5.imimg.com/data5/ANDROID/Default/2022/9/OW/YA/IE/15915523/product-jpeg-500x500.jpg"
        };

        const fishNames = {
            rte: ["Kerala Fish Curry", "Fish Tikka Masala", "Goan Fish Curry", "Fish Moilee", "Heat & Eat Fry"],
            river: ["Rohu Fresh", "Catla Steaks", "Pabda Whole", "Tangra", "Boal Cut", "Desi Singi"],
            sea: ["White Pomfret", "Surmai (King Fish)", "Red Snapper", "Indian Mackerel", "Tuna", "Cod"],
            prawns: ["Tiger Prawns", "Jumbo Prawns", "White Shrimps", "Vannamei", "Deveined Prawns"],
            boneless: ["Bhetki Fillet", "Salmon Steaks", "Tuna Chunks", "Rohu Cubes", "Surmai Boneless"],
            bengali: ["Padma Hilsa (Ilish)", "Chital Muitha", "Parshe Cut", "Koi Fish", "Kajoli Whole"],
            snacks: ["Fish Fingers", "Fish Pakora", "Fish Cutlet", "Fish Samosa", "Amritsari Fry"]
        };

        let inventory = [];
        let cart = [];

        // Generate 200 Products logic (Approx 29 per category)
        function buildInventory() {
            let id = 1;
            categories.forEach(c => {
                for(let i=0; i<29; i++) {
                    let baseName = fishNames[c.id][i % fishNames[c.id].length];
                    inventory.push({
                        id: id++,
                        name: `${baseName} (Batch ${i+1})`,
                        catId: c.id,
                        price: 180 + (Math.floor(Math.random()*80)*10),
                        weight: i % 2 === 0 ? "1kg" : "500g",
                        img: imagePool[c.id], // Fixed Image use ho raha hai
                        desc: `Freshly processed ${baseName} fish cleaned and packed with ice.`
                    });
                }
            });
        }

        function renderTabs() {
            const bar = document.getElementById('category-bar');
            categories.forEach(c => {
                bar.innerHTML += `<button id="tab-${c.id}" onclick="showCat('${c.id}')" class="category-btn border-b-2 border-transparent pb-1 transition-all">${c.name}</button>`;
            });
        }

        function showCat(catId) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active', 'border-[#e03546]'));
            document.getElementById(`tab-${catId}`).classList.add('active', 'border-[#e03546]');

            const list = document.getElementById('product-list');
            list.innerHTML = '';

            const filtered = inventory.filter(p => p.catId === catId);
            filtered.forEach(p => {
                list.innerHTML += `
                    <div class="product-card">
                        <div class="flex-1">
                            <div class="flex items-center gap-2 mb-2">
                                <span class="w-3 h-3 border border-red-600 flex items-center justify-center p-[2px]"><span class="w-1.5 h-1.5 bg-red-600 rounded-full"></span></span>
                                <span class="text-[9px] font-bold text-orange-500 uppercase tracking-widest">Natural Fish</span>
                            </div>
                            <h3 class="text-base font-bold text-slate-900 leading-tight mb-1">${p.name}</h3>
                            <p class="text-sm font-black text-slate-800">₹${p.price} <span class="text-slate-400 font-medium text-xs">/ ${p.weight}</span></p>
                            <p class="text-xs text-slate-400 mt-2 line-clamp-2 leading-relaxed">${p.desc}</p>
                        </div>
                        <div class="relative w-32 h-32 flex-shrink-0">
                            <img src="${p.img}" alt="${p.name}" class="w-full h-full object-cover rounded-2xl shadow-sm border border-slate-50">
                            <button onclick="addToCart(${p.id})" class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-white text-[#e03546] border border-slate-100 shadow-xl px-7 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-red-50 active:scale-90 transition-all">Add +</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(pid) {
            const item = inventory.find(x => x.id === pid);
            cart.push({...item, cartId: Date.now()});
            updateCart();
            document.getElementById('bottom-bar').classList.remove('hidden');
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.length ? '' : '<p class="text-center py-20 text-slate-300 font-bold uppercase text-xs">Cart Khali Hai</p>';
            
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                        <div class="flex items-center gap-3">
                            <img src="${item.img}" class="w-10 h-10 rounded-lg object-cover">
                            <div>
                                <h4 class="text-[10px] font-black uppercase text-slate-800 leading-tight">${item.name}</h4>
                                <p class="text-[10px] font-bold text-slate-400 mt-1">₹${item.price}</p>
                            </div>
                        </div>
                        <button onclick="removeFromCart(${item.cartId})" class="text-slate-400 hover:text-red-500 font-black text-2xl px-2">&times;</button>
                    </div>
                `;
            });
            document.getElementById('grand-total').innerText = `₹${total}`;
            document.getElementById('bar-total').innerText = `₹${total}`;
        }

        function removeFromCart(cid) {
            cart = cart.filter(x => x.cartId !== cid);
            updateCart();
            if(!cart.length) document.getElementById('bottom-bar').classList.add('hidden');
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('translate-x-full');
            document.getElementById('cart-overlay').classList.toggle('hidden');
        }

        function checkout() {
            const addr = document.getElementById('full-address').value;
            const total = document.getElementById('grand-total').innerText.replace('₹','');
            if(!addr || cart.length === 0) return alert("Address aur Items add karein!");
            window.location.href = `upi://pay?pa=${UPI_ID}&pn=KFK_INDIA&am=${total}&cu=INR&tn=KFK_Fish_Order`;
        }

        // Initialize
        buildInventory();
        renderTabs();
        showCat('rte');
    </script>
</body>
</html>
