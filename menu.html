<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK Mega Menu | 100+ Unique Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .product-card { transition: all 0.4s ease; border-radius: 2.5rem; overflow: hidden; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .category-btn.active { background: #002e6e; color: white; border-color: #002e6e; }
        #payment-modal { backdrop-filter: blur(8px); }
    </style>
</head>
<body class="bg-[#f8fafc]">

    <header class="sticky top-0 z-[100] bg-white/90 backdrop-blur-md border-b border-gray-100 py-4">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-[#002e6e] italic tracking-tighter">KFK<span class="text-orange-500">.</span>MENU</a>
            <div class="flex items-center gap-4">
                <div class="relative bg-slate-100 p-3 rounded-2xl cursor-pointer hover:bg-orange-500 hover:text-white transition-all" onclick="openCheckout()">
                    <span id="cart-counter" class="absolute -top-1 -right-1 bg-orange-600 text-white text-[9px] w-5 h-5 flex items-center justify-center rounded-full font-bold">0</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" /></svg>
                </div>
            </div>
        </div>
    </header>

    <section class="bg-[#002e6e] text-white py-12 text-center">
        <h1 class="text-4xl font-black italic uppercase">KFK Fresh <span class="text-orange-500">Inventory</span></h1>
        <p class="text-[10px] font-bold tracking-[0.4em] mt-2 opacity-70">REAL-TIME IMAGE SYNC | SMART CHECKOUT ENABLED</p>
    </section>

    <div class="sticky top-[73px] z-[90] bg-white border-b py-4 overflow-x-auto hide-scrollbar">
        <div class="max-w-7xl mx-auto px-6 flex gap-3">
            <button onclick="filterMenu('all')" class="category-btn active px-6 py-2.5 rounded-xl border text-[9px] font-black uppercase tracking-widest whitespace-nowrap">Show All</button>
            <button onclick="filterMenu('ready-to-eat')" class="category-btn px-6 py-2.5 rounded-xl border text-[9px] font-black uppercase tracking-widest whitespace-nowrap border-orange-500 text-orange-600">Ready To Eat (1kg)</button>
            <button onclick="filterMenu('prawns')" class="category-btn px-6 py-2.5 rounded-xl border text-[9px] font-black uppercase tracking-widest whitespace-nowrap">Prawns</button>
            <button onclick="filterMenu('seafood')" class="category-btn px-6 py-2.5 rounded-xl border text-[9px] font-black uppercase tracking-widest whitespace-nowrap">Seafood</button>
            <button onclick="filterMenu('snacks')" class="category-btn px-6 py-2.5 rounded-xl border text-[9px] font-black uppercase tracking-widest whitespace-nowrap">Snacks</button>
            <button onclick="filterMenu('bengali')" class="category-btn px-6 py-2.5 rounded-xl border text-[9px] font-black uppercase tracking-widest whitespace-nowrap">Bengali Cut</button>
        </div>
    </div>

    <section class="max-w-7xl mx-auto px-6 py-12">
        <div id="menu-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </section>

    <div id="payment-modal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-black/60">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-8 shadow-2xl relative overflow-hidden">
            <button onclick="closeCheckout()" class="absolute top-6 right-6 text-2xl font-black text-slate-300 hover:text-slate-800">&times;</button>
            <h2 class="text-2xl font-black text-[#002e6e] italic uppercase mb-2">Checkout</h2>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-6">Merchant: Kolkata Fish Kitchen</p>
            
            <div id="checkout-list" class="space-y-3 mb-8 max-h-48 overflow-y-auto pr-2"></div>
            
            <div class="border-t pt-6">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-xs font-black uppercase text-slate-500">Total Payable</span>
                    <span id="total-amount" class="text-3xl font-black text-[#002e6e]">₹0</span>
                </div>
                <button onclick="initiatePayment()" class="w-full bg-orange-500 text-white py-5 rounded-2xl font-black uppercase text-xs tracking-[0.2em] shadow-xl hover:bg-[#002e6e] transition-all">Pay via UPI</button>
                <p class="text-center text-[8px] font-bold text-slate-400 uppercase mt-4">🔒 Secure Payment Gateway</p>
            </div>
        </div>
    </div>

    <script>
        const PEXELS_KEY = "kfzzPEicE21y0WcDJEMhLn0eUETxYReptyKIbwehcGdtGB3oW4Ka7xYj";
        const UPI_ID = "kolka97560@barodampay";
        const MERCHANT_NAME = "Kolkata Fish Kitchen";
        
        let cart = JSON.parse(localStorage.getItem('kfk_cart')) || [];
        document.getElementById('cart-counter').innerText = cart.length;

        const db = [
            { id: 'rte1', name: "Fish Pakoda (1kg - 64 Pcs)", cat: 'ready-to-eat', price: 550, search: "crispy fried fish pakora", weight: '1kg' },
            { id: 'rte2', name: "Fish Momo (1kg - 40 Pcs)", cat: 'ready-to-eat', price: 225, search: "steamed fish momos platter", weight: '1kg' },
            { id: 'rte3', name: "Fish Curry (1kg - 48 Pcs)", cat: 'ready-to-eat', price: 550, search: "indian style fish curry", weight: '1kg' },
            { id: 'rte4', name: "Fish Patori (1kg - 16 Pcs)", cat: 'ready-to-eat', price: 560, search: "bengali fish paturi banana leaf", weight: '1kg' },
            { id: 'rte5', name: "Fish Tikka (1kg - 24 Pcs)", cat: 'ready-to-eat', price: 600, search: "tandoori fish tikka", weight: '1kg' },
            { id: 'rte6', name: "Fish Pickle (1kg Homemade)", cat: 'ready-to-eat', price: 600, search: "spicy fish pickle", weight: '1kg' },
            { id: 'rte7', name: "Fish Popcorn (1kg - 80 Pcs)", cat: 'ready-to-eat', price: 550, search: "crunchy fish popcorn snack", weight: '1kg' },
            { id: 'rte8', name: "Fish Cutlet (1kg - 48 Pcs)", cat: 'ready-to-eat', price: 600, search: "fish cutlet fry", weight: '1kg' },
            { id: 'rte9', name: "Fish Finger (1kg - 28 Pcs)", cat: 'ready-to-eat', price: 550, search: "golden fish fingers", weight: '1kg' },
            // Automation for categories
            ...["Tiger Prawns", "Jumbo King Prawns", "Pink Shrimp", "White Prawns", "Vannamei"].map((name, i) => ({
                id: `p${i}`, name, cat: 'prawns', price: 450 + (i*50), search: `raw fresh ${name}`, weight: '500g'
            })),
            ...["Silver Pomfret", "Atlantic Salmon", "Surmai Steak"].map((name, i) => ({
                id: `s${i}`, name, cat: 'seafood', price: 800 + (i*100), search: `fresh ${name} fish`, weight: '1kg'
            })),
            ...["Rohu Bengali Cut", "Hilsa (Ilish)", "Pabda"].map((name, i) => ({
                id: `b${i}`, name, cat: 'bengali', price: 350 + (i*150), search: `fresh raw ${name} fish`, weight: '500g'
            }))
        ];

        function addToCart(btn, name, price) {
            cart.push({ name, price });
            localStorage.setItem('kfk_cart', JSON.stringify(cart));
            document.getElementById('cart-counter').innerText = cart.length;

            const original = btn.innerText;
            btn.innerText = "Added ✓";
            btn.classList.replace('bg-[#002e6e]', 'bg-green-600');
            setTimeout(() => {
                btn.innerText = original;
                btn.classList.replace('bg-green-600', 'bg-[#002e6e]');
            }, 800);
        }

        async function fetchImage(query, elementId) {
            try {
                const r = await fetch(`https://api.pexels.com/v1/search?query=${query}&per_page=1`, {
                    headers: { Authorization: PEXELS_KEY }
                });
                const d = await r.json();
                if(d.photos.length > 0) document.getElementById(elementId).src = d.photos[0].src.medium;
            } catch(e) {}
        }

        function renderMenu(filter = 'all') {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = '';
            const filtered = filter === 'all' ? db : db.filter(x => x.cat === filter);

            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card bg-white border border-gray-100 shadow-sm flex flex-col">
                        <div class="h-44 overflow-hidden bg-slate-100">
                            <img id="img-${p.id}" class="w-full h-full object-cover" src="https://via.placeholder.com/400x300?text=KFK+Fresh">
                        </div>
                        <div class="p-5 flex-1 flex flex-col">
                            <span class="text-[8px] font-black text-orange-500 uppercase tracking-widest">${p.cat} | ${p.weight}</span>
                            <h3 class="text-sm font-black text-[#002e6e] mt-1 mb-4 leading-tight">${p.name}</h3>
                            <div class="mt-auto flex justify-between items-center">
                                <span class="text-lg font-black text-slate-800">₹${p.price}</span>
                                <button onclick="addToCart(this, '${p.name}', ${p.price})" class="bg-[#002e6e] text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase tracking-widest active:scale-95 transition-all">Add to Cart</button>
                            </div>
                        </div>
                    </div>
                `;
                fetchImage(p.search, `img-${p.id}`);
            });
        }

        function openCheckout() {
            const list = document.getElementById('checkout-list');
            let total = 0;
            list.innerHTML = cart.length ? '' : '<p class="text-center text-slate-400 font-bold py-4">Cart is empty</p>';
            
            cart.forEach((item, idx) => {
                total += item.price;
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-gray-100">
                        <span class="text-[10px] font-black uppercase text-[#002e6e] truncate w-2/3">${item.name}</span>
                        <span class="text-xs font-black">₹${item.price}</span>
                    </div>
                `;
            });
            
            document.getElementById('total-amount').innerText = `₹${total}`;
            document.getElementById('payment-modal').classList.remove('hidden');
        }

        function closeCheckout() {
            document.getElementById('payment-modal').classList.add('hidden');
        }

        function initiatePayment() {
            const total = document.getElementById('total-amount').innerText.replace('₹', '');
            if(total == "0") return alert("Cart empty hai!");
            
            // Standard UPI Deep Link
            const upiUrl = `upi://pay?pa=${UPI_ID}&pn=${encodeURIComponent(MERCHANT_NAME)}&am=${total}&cu=INR&tn=Order%20from%20KFK%20India`;
            
            window.location.href = upiUrl;
            
            // Note: Mobile devices par ye seedha PhonePe/GPay open karega.
        }

        function filterMenu(cat) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            if(window.event) window.event.target.classList.add('active');
            renderMenu(cat);
        }

        renderMenu();
    </script>
</body>
</html>
