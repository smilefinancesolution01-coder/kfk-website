<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK India | Official Fish Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .cat-active { background: #e03546; color: white; border-color: #e03546; }
        .product-card { display: flex; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid #f1f5f9; }
        .fish-img { width: 130px; height: 130px; object-fit: cover; border-radius: 18px; background: #f8fafc; }
    </style>
</head>
<body class="bg-white">

    <header class="sticky top-0 z-50 bg-white border-b p-4">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black italic text-[#e03546]">KFK<span class="text-slate-900">.INDIA</span></h1>
            <div id="cart-btn" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold">0 Items</div>
        </div>
    </header>

    <nav class="sticky top-[68px] z-40 bg-white border-b overflow-x-auto no-scrollbar py-3 px-4 shadow-sm">
        <div id="cat-list" class="max-w-2xl mx-auto flex gap-4 text-[11px] font-black uppercase tracking-widest">
            </div>
    </nav>

    <main class="max-w-2xl mx-auto px-4 py-6 mb-20">
        <div id="menu-items" class="space-y-2">
            </div>
    </main>

    <script>
        const categories = [
            { id: 'rte', name: 'Ready to Eat', img: 'https://images.unsplash.com/photo-1589187151032-573a91317445?w=400' },
            { id: 'river', name: 'River Fish', img: 'https://5.imimg.com/data5/ANDROID/Default/2021/1/HX/OL/DU/119931758/product-jpeg-500x500.jpg' },
            { id: 'sea', name: 'Sea Food', img: 'https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=400' },
            { id: 'prawns', name: 'Prawns', img: 'https://images.unsplash.com/photo-1559737558-2f5a35f4523b?w=400' },
            { id: 'bengali', name: 'Bengali Cut', img: 'https://5.imimg.com/data5/SELLER/Default/2021/10/TC/ZB/FY/39290072/paddmar-ilish-fish-500x500.jpg' }
        ];

        const fishData = {
            rte: ["Kerala Fish Curry", "Meen Moilee", "Fish Tikka", "Goan Curry"],
            river: ["Fresh Rohu", "Catla Steaks", "Pabda Whole", "Tangra"],
            sea: ["Pomfret White", "Surmai Steak", "Red Snapper", "Salmon"],
            prawns: ["Tiger Prawns", "Jumbo Prawns", "Cocktail Prawns"],
            bengali: ["Hilsa Ilish", "Chital Muitha", "Parshe Cut"]
        };

        let inventory = [];
        function init() {
            categories.forEach(c => {
                for(let i=0; i<40; i++) { // Creating 200 items
                    let name = fishData[c.id][i % fishData[c.id].length];
                    inventory.push({
                        id: inventory.length + 1,
                        name: `${name} ${i === 0 ? '' : '(Special Pack ' + i + ')'}`,
                        cat: c.id,
                        price: 180 + (Math.floor(Math.random() * 50) * 10),
                        img: c.img
                    });
                }
            });
        }

        function render(catId) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('cat-active'));
            document.getElementById('btn-' + catId).classList.add('cat-active');
            
            const container = document.getElementById('menu-items');
            container.innerHTML = '';
            inventory.filter(p => p.cat === catId).forEach(p => {
                container.innerHTML += `
                    <div class="product-card">
                        <div class="flex-1">
                            <h3 class="text-lg font-bold text-slate-800">${p.name}</h3>
                            <p class="text-sm font-black text-slate-900 mt-1">₹${p.price}</p>
                            <p class="text-xs text-slate-400 mt-2">100% Fresh & Cleaned fish delivered to your doorstep.</p>
                        </div>
                        <div class="relative flex-shrink-0">
                            <img src="${p.img}" class="fish-img shadow-sm border border-slate-100" onerror="this.src='https://via.placeholder.com/150?text=Fish'">
                            <button class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-white text-[#e03546] border border-slate-200 px-6 py-1 rounded-lg text-[10px] font-black shadow-lg uppercase">Add</button>
                        </div>
                    </div>
                `;
            });
        }

        init();
        const nav = document.getElementById('cat-list');
        categories.forEach(c => {
            nav.innerHTML += `<button id="btn-${c.id}" onclick="render('${c.id}')" class="cat-btn border-b-2 border-transparent pb-1 transition-all whitespace-nowrap">${c.name}</button>`;
        });
        render('rte');
    </script>
</body>
