<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK India | Premium Fish Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fff; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .cat-btn.active { background: #e03546; color: white; border-color: #e03546; box-shadow: 0 10px 20px rgba(224, 53, 70, 0.15); }
        .product-card { border-bottom: 1px solid #f1f5f9; padding: 2rem 0; display: flex; justify-content: space-between; gap: 1.5rem; transition: all 0.2s; }
        .product-card:hover { background: #fafafa; padding-left: 10px; padding-right: 10px; border-radius: 12px; }
        .cart-drawer { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-slate-900">

    <header class="sticky top-0 z-[100] bg-white border-b border-slate-100 px-6 py-5">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black italic text-[#e03546] tracking-tighter uppercase">KFK<span class="text-slate-900">.INDIA</span></h1>
                <p class="text-[9px] font-bold text-slate-400 uppercase tracking-[0.3em]">Dam Good Fish Quality</p>
            </div>
            <button onclick="toggleCart()" class="bg-slate-900 text-white px-6 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center gap-2">
                <span id="cart-count">0</span> Items
            </button>
        </div>
    </header>

    <nav class="sticky top-[85px] z-[90] bg-white border-b overflow-x-auto no-scrollbar py-4 px-6">
        <div id="category-tabs" class="max-w-5xl mx-auto flex gap-4 text-[11px] font-black uppercase tracking-widest">
            </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 py-12 mb-32">
        <div id="product-container" class="space-y-2">
            </div>
    </main>

    <div id="bottom-bar" class="fixed bottom-0 left-0 w-full bg-white border-t p-5 hidden shadow-2xl z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <p id="bar-total" class="text-2xl font-black italic tracking-tighter">₹0</p>
            <button onclick="toggleCart()" class="bg-[#e03546] text-white px-12 py-4 rounded-2xl font-black uppercase text-xs">Checkout</button>
        </div>
    </div>

    <div id="cart-overlay" class="fixed inset-0 bg-black/40 z-[200] hidden backdrop-blur-sm" onclick="toggleCart()"></div>
    <div id="cart-drawer" class="fixed right-0 top-0 h-full w-full max-w-md bg-white z-[201] cart-drawer translate-x-full flex flex-col">
        <div class="p-8 border-b flex justify-between items-center bg-slate-50">
            <h2 class="text-xl font-black italic uppercase">My Basket</h2>
            <button onclick="toggleCart()" class="text-3xl text-slate-300">&times;</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-8 border-t bg-white space-y-4">
            <input type="text" id="user-address" placeholder="Delivery Address" class="w-full p-4 bg-slate-100 rounded-xl outline-none text-sm border-2 border-transparent focus:border-red-500">
            <button onclick="checkout()" class="w-full bg-[#e03546] text-white py-5 rounded-2xl font-black uppercase text-xs">Order Now</button>
        </div>
    </div>

    <script>
        const categories = [
            { id: 'rte', name: 'Ready to Eat', img: 'https://images.unsplash.com/photo-1589187151032-573a91317445?w=500&auto=format' },
            { id: 'river', name: 'River Fish', img: 'https://images.unsplash.com/photo-1534604973900-c41ab4c5e636?w=500&auto=format' },
            { id: 'sea', name: 'Sea Food', img: 'https://images.unsplash.com/photo-1519708227418-c8fd9a32b7a2?w=500&auto=format' },
            { id: 'prawns', name: 'Prawns', img: 'https://images.unsplash.com/photo-1559737558-2f5a35f4523b?w=500&auto=format' },
            { id: 'bengali', name: 'Bengali Cut', img: 'https://images.unsplash.com/photo-1590546452302-602d6ad61e3f?w=500&auto=format' }
        ];

        const fishData = {
            rte: ["Fish Tikka", "Kerala Curry", "Fish Pakora", "Amritsari Fry"],
            river: ["Rohu Fresh", "Catla Steaks", "Pabda Whole", "Tangra"],
            sea: ["Pomfret White", "Surmai Steak", "Red Snapper", "Salmon"],
            prawns: ["Tiger Prawns", "King Shrimps", "Cocktail Prawns"],
            bengali: ["Padma Ilish", "Chital Muitha", "Koi Fish", "Kajoli"]
        };

        let inventory = [];
        let cart = [];

        function build() {
            let id = 1;
            categories.forEach(c => {
                for(let i=0; i<40; i++) {
                    let base = fishData[c.id][i % fishData[c.id].length];
                    inventory.push({
                        id: id++,
                        name: `${base} ${i === 0 ? '' : '(Premium Cut '+i+')'}`,
                        cat: c.id,
                        price: 180 + (Math.floor(Math.random()*60)*10),
                        img: c.img,
                        weight: i % 2 === 0 ? "1kg" : "500g"
                    });
                }
            });
        }

        function render(catId) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${catId}`).classList.add('active');
            
            const list = document.getElementById('product-container');
            list.innerHTML = '';
            inventory.filter(p => p.cat === catId).forEach(p => {
                list.innerHTML += `
                    <div class="product-card">
                        <div class="flex-1">
                            <h3 class="text-lg font-black text-slate-800 leading-tight">${p.name}</h3>
                            <p class="text-sm font-bold text-slate-900 mt-1">₹${p.price} <span class="text-slate-400 text-[10px]">/ ${p.weight}</span></p>
                            <p class="text-[11px] text-slate-400 mt-3 line-clamp-2">Sustainably sourced, cleaned and ready to cook. Premium quality guaranteed.</p>
                        </div>
                        <div class="relative w-32 h-32 flex-shrink-0">
                            <img src="${p.img}" class="w-full h-full object-cover rounded-3xl border border-slate-100 shadow-sm" onerror="this.src='https://via.placeholder.com/300?text=Fish'">
                            <button onclick="addToCart(${p.id})" class="absolute -bottom-2 left-1/2 -translate-x-1/2 bg-white text-[#e03546] border border-slate-100 px-7 py-2 rounded-xl text-[10px] font-black shadow-xl uppercase active:scale-95 transition-all">Add +</button>
                        </div>
                    </div>
                `;
            });
        }

        function addToCart(pid) {
            const item = inventory.find(x => x.id === pid);
            cart.push({...item, cartId: Date.now()});
            updateUI();
            document.getElementById('bottom-bar').classList.remove('hidden');
        }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.length ? '' : '<p class="text-center py-20 text-slate-300 font-bold text-xs">Empty Basket</p>';
            let total = 0;
            cart.forEach(item => {
                total += item.price;
                container.innerHTML += `<div class="bg-slate-50 p-4 rounded-xl flex justify-between items-center"><span class="text-[10px] font-bold uppercase">${item.name}</span><span class="font-black text-xs">₹${item.price}</span></div>`;
            });
            document.getElementById('bar-total').innerText = `₹${total}`;
            document.getElementById('grand-total').innerText = `₹${total}`;
        }

        function toggleCart() {
            document.getElementById('cart-drawer').classList.toggle('translate-x-full');
            document.getElementById('cart-overlay').classList.toggle('hidden');
        }

        function checkout() {
            const total = document.getElementById('bar-total').innerText.replace('₹','');
            window.location.href = `upi://pay?pa=kolka97560@barodampay&pn=KFK_INDIA&am=${total}&cu=INR`;
        }

        build();
        const nav = document.getElementById('category-tabs');
        categories.forEach(c => {
            nav.innerHTML += `<button id="tab-${c.id}" onclick="render('${c.id}')" class="cat-btn border-b-4 border-transparent pb-2 transition-all px-4">${c.name}</button>`;
        });
        render('river');
    </script>
</body>
</html>
