<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | KFK India Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-font { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-white">

    <header class="border-b h-20 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-[#002e6e] hero-font italic uppercase">KFK<span class="text-orange-500">.</span>India</a>
            <a href="faq.html" class="text-[10px] font-black uppercase tracking-widest text-slate-400">Visit Help Center</a>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-20 grid grid-cols-1 lg:grid-cols-2 gap-20">
        <div>
            <h6 class="text-orange-500 font-black text-xs uppercase tracking-[0.4em] mb-4">Support</h6>
            <h1 class="text-5xl md:text-7xl font-black hero-font uppercase italic leading-none mb-10">Get In <span class="text-orange-500">Touch.</span></h1>
            
            <form class="space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black uppercase mb-2">Your Name</label>
                        <input type="text" class="bg-gray-50 border p-4 rounded-xl focus:outline-orange-500 text-sm" placeholder="John Doe">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[9px] font-black uppercase mb-2">Subject</label>
                        <select class="bg-gray-50 border p-4 rounded-xl focus:outline-orange-500 text-sm">
                            <option>Order Support</option>
                            <option>Franchise Query</option>
                            <option>Feedback</option>
                        </select>
                    </div>
                </div>
                <div class="flex flex-col">
                    <label class="text-[9px] font-black uppercase mb-2">Email Address</label>
                    <input type="email" class="bg-gray-50 border p-4 rounded-xl focus:outline-orange-500 text-sm" placeholder="care@kfkindia.com">
                </div>
                <div class="flex flex-col">
                    <label class="text-[9px] font-black uppercase mb-2">Message</label>
                    <textarea rows="5" class="bg-gray-50 border p-4 rounded-xl focus:outline-orange-500 text-sm" placeholder="How can we help you?"></textarea>
                </div>
                <button class="bg-[#002e6e] text-white w-full py-5 rounded-xl font-black uppercase text-xs tracking-[0.2em] shadow-xl hover:bg-orange-500 transition-all">Send Message</button>
            </form>
        </div>

        <div class="space-y-12">
            <div class="rounded-[3rem] overflow-hidden h-[300px]">
                <img id="contact-img" class="w-full h-full object-cover" src="">
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <div>
                    <h4 class="font-black text-xs uppercase tracking-widest text-orange-500 mb-4">Call Us</h4>
                    <p class="text-2xl font-black text-[#002e6e]">+91 91430 12513</p>
                    <p class="text-[10px] font-bold text-slate-400 uppercase mt-2">Mon - Sun (9 AM - 9 PM)</p>
                </div>
                <div>
                    <h4 class="font-black text-xs uppercase tracking-widest text-orange-500 mb-4">Email Us</h4>
                    <p class="text-xl font-black text-[#002e6e]">care@kfkindia.com</p>
                    <p class="text-[10px] font-bold text-slate-400 uppercase mt-2">Response within 2 hours</p>
                </div>
                <div class="md:col-span-2">
                    <h4 class="font-black text-xs uppercase tracking-widest text-orange-500 mb-4">Head Office</h4>
                    <p class="text-sm font-bold text-slate-600 break-word uppercase">Corporate Hub, New Delhi - 110001, India</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-black text-white py-10 text-center text-[9px] font-black tracking-[0.4em] uppercase">
        © 2026 KFK India Operations | All Rights Reserved
    </footer>

    <script>
        const API_KEY = "kfzzPEicE21y0WcDJEMhLn0eUETxYReptyKIbwehcGdtGB3oW4Ka7xYj";
        async function load() {
            const res = await fetch('https://api.pexels.com/v1/search?query=customer service headset&per_page=1', { headers: { Authorization: API_KEY } });
            const d = await res.json();
            document.getElementById('contact-img').src = d.photos[0].src.large;
        }
        load();
    </script>
</body>
</html>
