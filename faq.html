<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ | KFK India - Your Questions Answered</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-font { font-family: 'Outfit', sans-serif; }
        .faq-card { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .faq-card:hover { border-color: #f97316; background: #fffcf9; }
        .break-word { overflow-wrap: break-word; word-wrap: break-word; word-break: break-word; }
    </style>
</head>
<body class="bg-white text-slate-900">

    <header class="h-20 border-b flex items-center sticky top-0 bg-white/90 backdrop-blur-md z-50">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-[#002e6e] hero-font italic uppercase">KFK<span class="text-orange-500">.</span>India</a>
            <a href="contact.html" class="bg-[#002e6e] text-white px-5 py-2 rounded-lg text-[10px] font-black uppercase">Need Support?</a>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-20">
        <div class="text-center mb-20">
            <h6 class="text-orange-500 font-black text-xs uppercase tracking-[0.4em] mb-4">Help Center</h6>
            <h1 class="text-5xl md:text-7xl font-black hero-font uppercase italic leading-none break-word">Common <span class="text-orange-500">Queries.</span></h1>
            <p class="mt-6 text-slate-500 text-sm font-medium">Everything you need to know about our products, delivery, and franchise.</p>
        </div>

        <div class="space-y-4">
            <script>
                const faqs = [
                    { q: "Is your fish really chemical-free?", a: "Yes. We have a zero-tolerance policy for Formalin and Ammonia. Every batch undergoes a 21-point quality check before reaching your doorstep." },
                    { q: "How do you maintain freshness during delivery?", a: "We use a proprietary cold-chain technology that keeps the products between 0°C to 4°C throughout the transit. We never freeze our meat." },
                    { q: "What is your delivery time?", a: "We offer express delivery within 90-120 minutes in Delhi, Gurugram, and Kolkata, depending on your distance from our nearest hub." },
                    { q: "Can I take a franchise for my city?", a: "Absolutely! KFK India is expanding rapidly. You can apply via our Franchise page to join India's most profitable fresh meat network." },
                    { q: "What is the source of your fish?", a: "We source our freshwater fish directly from the Ganges and Padma rivers, and our seafood from the coastal landing centers of Odisha and West Bengal." },
                    { q: "Do you provide staff training for franchise?", a: "Yes, we provide institutional-grade training covering meat cutting, hygiene, and customer service. Check our Training page for details." }
                ];

                faqs.forEach(f => {
                    document.write(`
                        <div class="faq-card p-8 rounded-[2rem] bg-gray-50">
                            <h4 class="text-sm md:text-base font-black uppercase tracking-tight mb-4 break-word text-[#002e6e] italic">Q: ${f.q}</h4>
                            <p class="text-xs md:text-sm text-slate-500 leading-relaxed break-word font-medium">A: ${f.a}</p>
                        </div>
                    `);
                });
            </script>
        </div>

        <div class="mt-20 p-10 bg-[#002e6e] rounded-[3rem] text-center text-white">
            <h3 class="text-2xl font-black italic hero-font uppercase mb-4">Still have questions?</h3>
            <p class="text-xs text-slate-400 mb-8 uppercase font-bold tracking-widest">Our team is ready to help you 24/7</p>
            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <a href="contact.html" class="bg-orange-500 text-white px-8 py-4 rounded-xl font-black text-[10px] uppercase">Contact Support</a>
                <a href="about.html" class="bg-white text-black px-8 py-4 rounded-xl font-black text-[10px] uppercase">Learn Our Story</a>
            </div>
        </div>
    </main>

    <footer class="bg-white border-t py-10 text-center text-[9px] font-black tracking-[0.4em] uppercase text-slate-400">
        © 2026 KFK India Operations | Institutional Quality Standards
    </footer>

</body>
</html>
