<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal Compliance | KFK Standards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-900">
    <nav class="p-6 bg-white border-b flex justify-between items-center">
        <a href="index.html" class="text-[10px] font-bold uppercase tracking-widest text-blue-900">← Home</a>
        <div class="text-xl font-black text-blue-900">KFK <span class="text-orange-500 italic text-2xl">LEGAL</span></div>
    </nav>

    <section class="py-24 max-w-4xl mx-auto px-6">
        <h2 class="text-4xl font-black text-blue-950 uppercase mb-12 text-center">Global Quality <span class="text-orange-600 italic">Certifications</span></h2>
        <div class="grid gap-6">
            <div class="bg-white p-8 rounded-3xl shadow-sm flex justify-between items-center border border-slate-100">
                <span class="font-bold uppercase tracking-widest text-xs">FSSAI License (Food Safety)</span>
                <span class="text-green-600 font-black italic uppercase text-[10px]">Verified ✅</span>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-sm flex justify-between items-center border border-slate-100">
                <span class="font-bold uppercase tracking-widest text-xs">ISO 22000 (Food Management)</span>
                <span class="text-green-600 font-black italic uppercase text-[10px]">Certified ✅</span>
            </div>
            <div class="bg-white p-8 rounded-3xl shadow-sm flex justify-between items-center border border-slate-100">
                <span class="font-bold uppercase tracking-widest text-xs">GST & MSME Registration</span>
                <span class="text-green-600 font-black italic uppercase text-[10px]">Registered ✅</span>
            </div>
        </div>
    </section>
</body>
</html>
