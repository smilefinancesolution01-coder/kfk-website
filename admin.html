<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK Admin | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fe; }
        .tab-btn.active { background: #002e6e; color: white; }
        .order-card { border-left: 5px solid #fb923c; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h1 class="text-4xl font-black text-[#002e6e] italic tracking-tighter">KFK<span class="text-orange-500">.</span>CONTROL</h1>
                <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Business Operations & Sales</p>
            </div>
            
            <div class="flex bg-white p-1.5 rounded-2xl shadow-sm border border-gray-100">
                <button onclick="switchTab('inventory')" id="tab-inventory" class="tab-btn active px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Inventory</button>
                <button onclick="switchTab('orders')" id="tab-orders" class="tab-btn px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">New Orders</button>
            </div>
        </div>

        <div id="section-inventory" class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            <div class="lg:col-span-1">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-gray-50">
                    <h2 class="text-xl font-black text-[#002e6e] mb-6 uppercase italic">Add Product</h2>
                    <div class="space-y-4">
                        <input type="text" id="p-name" placeholder="Item Name" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold border focus:border-orange-500">
                        <select id="p-cat" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold border">
                            <option value="river">River Fish</option>
                            <option value="seafood">Sea Food</option>
                            <option value="prawns">Prawns</option>
                            <option value="ready">Ready to Eat</option>
                        </select>
                        <input type="number" id="p-price" placeholder="Price (₹)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold border">
                        <input type="file" id="p-image" accept="image/*" class="w-full p-4 bg-slate-50 border-2 border-dashed rounded-2xl text-xs font-bold">
                        <button onclick="saveToMenu()" class="w-full bg-orange-500 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-orange-500/20">Publish</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div id="admin-product-list" class="space-y-4">
                    </div>
            </div>
        </div>

        <div id="section-orders" class="hidden">
            <div class="bg-white p-8 rounded-[3rem] shadow-xl border border-gray-50">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-2xl font-black text-[#002e6e] uppercase italic">Incoming Orders</h2>
                    <button onclick="clearOrders()" class="text-[10px] font-black text-red-500 uppercase border border-red-100 px-4 py-2 rounded-xl hover:bg-red-50">Clear History</button>
                </div>
                
                <div id="order-list" class="space-y-6">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // 1. TAB SWITCHING LOGIC
        function switchTab(tab) {
            document.getElementById('section-inventory').classList.add('hidden');
            document.getElementById('section-orders').classList.add('hidden');
            document.getElementById('tab-inventory').classList.remove('active');
            document.getElementById('tab-orders').classList.remove('active');

            document.getElementById('section-' + tab).classList.remove('hidden');
            document.getElementById('tab-' + tab).classList.add('active');
            
            if(tab === 'orders') loadOrders();
            else loadAdminInventory();
        }

        // 2. ORDER MANAGEMENT LOGIC
        function loadOrders() {
            const orderList = document.getElementById('order-list');
            const orders = JSON.parse(localStorage.getItem('kfk_orders')) || [];

            if(orders.length === 0) {
                orderList.innerHTML = `<div class="text-center py-20 text-slate-300 font-bold">No orders received yet.</div>`;
                return;
            }

            orderList.innerHTML = orders.reverse().map(order => `
                <div class="order-card bg-slate-50 p-6 rounded-3xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4 transition-all hover:bg-white hover:shadow-md border border-gray-100">
                    <div>
                        <div class="flex items-center gap-3 mb-1">
                            <span class="text-[10px] font-black bg-orange-100 text-orange-600 px-3 py-1 rounded-full uppercase">Order #${order.id.toString().slice(-4)}</span>
                            <span class="text-[10px] font-bold text-slate-400 uppercase">${new Date(order.id).toLocaleString()}</span>
                        </div>
                        <h4 class="text-lg font-black text-[#002e6e] uppercase">${order.customer}</h4>
                        <p class="text-xs font-bold text-slate-500 mt-1 flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" /></svg>
                            ${order.phone || 'N/A'}
                        </p>
                    </div>
                    <div class="text-left md:text-right">
                        <p class="text-[10px] font-black text-slate-400 uppercase">Order Value</p>
                        <h3 class="text-2xl font-black text-orange-500 italic">₹${order.amount}</h3>
                        <span class="text-[9px] font-black text-green-500 uppercase tracking-widest">Payment: COD</span>
                    </div>
                </div>
            `).join('');
        }

        function clearOrders() {
            if(confirm("Saare orders delete kar dein?")) {
                localStorage.removeItem('kfk_orders');
                loadOrders();
            }
        }

        // --- INVENTORY LOGIC (PREVIOUSLY PROVIDED) ---
        function saveToMenu() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const cat = document.getElementById('p-cat').value;
            const file = document.getElementById('p-image').files[0];

            if(!name || !price || !file) { alert("Details please!"); return; }

            const reader = new FileReader();
            reader.onload = function(e) {
                let menu = JSON.parse(localStorage.getItem('kfk_custom_menu')) || [];
                menu.unshift({ id: Date.now(), name, price, cat, image: e.target.result });
                localStorage.setItem('kfk_custom_menu', JSON.stringify(menu));
                alert("Published!"); loadAdminInventory();
            };
            reader.readAsDataURL(file);
        }

        function loadAdminInventory() {
            const list = document.getElementById('admin-product-list');
            const items = JSON.parse(localStorage.getItem('kfk_custom_menu')) || [];
            list.innerHTML = items.map(item => `
                <div class="flex items-center justify-between p-4 bg-white rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex items-center gap-4">
                        <img src="${item.image}" class="w-14 h-14 rounded-xl object-cover">
                        <div><h4 class="font-black text-[#002e6e] text-xs uppercase">${item.name}</h4><p class="text-[9px] font-bold text-slate-400">₹${item.price}</p></div>
                    </div>
                    <button onclick="deleteItem(${item.id})" class="text-red-400 p-2 hover:bg-red-50 rounded-lg">Delete</button>
                </div>
            `).join('');
        }

        function deleteItem(id) {
            let menu = JSON.parse(localStorage.getItem('kfk_custom_menu')) || [];
            localStorage.setItem('kfk_custom_menu', JSON.stringify(menu.filter(i => i.id !== id)));
            loadAdminInventory();
        }

        window.onload = loadAdminInventory;
    </script>
</body>
</html>
