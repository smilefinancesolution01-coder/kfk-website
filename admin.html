<div class="space-y-4">
    <input type="text" id="p-name" placeholder="Item Name (e.g. Fresh Rohu)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold border">
    
    <div class="grid grid-cols-2 gap-4">
        <input type="number" id="p-price" placeholder="Original Price (MRP)" class="p-4 bg-slate-50 rounded-2xl outline-none font-bold border">
        <input type="number" id="p-discount" placeholder="Offer Price (Sale)" class="p-4 bg-slate-50 rounded-2xl outline-none font-bold border">
    </div>

    <div class="grid grid-cols-2 gap-4">
        <input type="text" id="p-weight" placeholder="Weight (e.g. 500g / 1kg)" class="p-4 bg-slate-50 rounded-2xl outline-none font-bold border">
        <select id="p-cat" class="p-4 bg-slate-50 rounded-2xl outline-none font-bold border">
            <option value="river">River Fish</option>
            <option value="seafood">Sea Food</option>
            <option value="prawns">Prawns</option>
        </select>
    </div>

    <textarea id="p-desc" placeholder="Product Description (Specialty, cleaning info...)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold border h-24"></textarea>
    
    <input type="file" id="p-image" accept="image/*" class="w-full p-4 bg-slate-50 border-2 border-dashed rounded-2xl text-xs font-bold">
    
    <button onclick="saveToMenu()" class="w-full bg-orange-500 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-lg shadow-orange-500/20 hover:bg-[#002e6e] transition-all">Publish Live</button>
</div>

<script>
function saveToMenu() {
    const name = document.getElementById('p-name').value;
    const price = document.getElementById('p-price').value;
    const discount = document.getElementById('p-discount').value;
    const weight = document.getElementById('p-weight').value;
    const desc = document.getElementById('p-desc').value;
    const cat = document.getElementById('p-cat').value;
    const file = document.getElementById('p-image').files[0];

    if(!name || !discount || !file) { alert("Basic details bharna zaruri hai!"); return; }

    const reader = new FileReader();
    reader.onload = function(e) {
        let menu = JSON.parse(localStorage.getItem('kfk_custom_menu')) || [];
        menu.unshift({
            id: Date.now(),
            name, price, discount, weight, desc, cat,
            image: e.target.result
        });
        localStorage.setItem('kfk_custom_menu', JSON.stringify(menu));
        alert("Product Live Ho Gaya! ✅");
        location.reload();
    };
    reader.readAsDataURL(file);
}
</script>
