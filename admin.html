<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK Admin | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fa; }
        .nav-link.active { background: #f97316; color: white; box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.3); }
        .section-card { display: none; }
        .section-card.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col lg:flex-row min-h-screen">

    <aside class="w-full lg:w-72 bg-[#002e6e] text-white p-8 flex flex-col shadow-2xl z-50">
        <div class="mb-12">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase leading-none">KFK<br><span class="text-orange-500">ADMIN</span></h1>
            <div class="h-1 w-12 bg-orange-500 mt-2"></div>
        </div>

        <nav class="space-y-3 flex-1">
            <button onclick="showSection('orders')" id="btn-orders" class="nav-link active w-full p-4 rounded-2xl font-bold flex items-center gap-4 transition-all hover:bg-white/10 text-left">
                <span class="text-xl">📦</span> Live Orders
            </button>
            <button onclick="showSection('add-product')" id="btn-add-product" class="nav-link w-full p-4 rounded-2xl font-bold flex items-center gap-4 transition-all hover:bg-white/10 text-left">
                <span class="text-xl">📸</span> Add Fish Stock
            </button>
            <button onclick="showSection('reports')" id="btn-reports" class="nav-link w-full p-4 rounded-2xl font-bold flex items-center gap-4 transition-all hover:bg-white/10 text-left">
                <span class="text-xl">📈</span> Sales Analytics
            </button>
        </nav>

        <div class="pt-10 border-t border-white/10 mt-auto">
            <p class="text-[10px] font-bold text-blue-300 uppercase tracking-widest">Logged in as Founder</p>
            <p class="text-xs font-bold mt-1">Mohmmad Aarif</p>
        </div>
    </aside>

    <main class="flex-1 p-6 lg:p-12 overflow-y-auto">

        <section id="orders-section" class="section-card active">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
                <div>
                    <h2 class="text-4xl font-black text-slate-800 italic uppercase tracking-tighter">Live Orders</h2>
                    <p class="text-slate-500 font-bold text-xs uppercase tracking-widest mt-1">Tracking customer requests in real-time</p>
                </div>
                <button onclick="fetchOrdersFromSheet()" class="bg-white px-6 py-4 rounded-2xl font-black text-[#002e6e] shadow-xl shadow-blue-900/5 hover:scale-95 transition-all flex items-center gap-3 border border-slate-100 uppercase text-xs tracking-widest">
                    <span id="refresh-icon">🔄</span> Refresh Dashboard
                </button>
            </div>

            <div class="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50/50 border-b border-slate-100">
                            <tr>
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Order Details</th>
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Amount</th>
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Status</th>
                                <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="order-body" class="divide-y divide-slate-50">
                             </tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="add-product-section" class="section-card">
            <div class="mb-10">
                <h2 class="text-4xl font-black text-slate-800 italic uppercase tracking-tighter">Add Stock</h2>
                <p class="text-slate-500 font-bold text-xs uppercase tracking-widest mt-1">Capture photos and push to live menu</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
                <div class="lg:col-span-5 space-y-6">
                    <div class="relative w-full aspect-square bg-slate-200 rounded-[3rem] overflow-hidden border-4 border-white shadow-2xl flex items-center justify-center group">
                        <video id="video" class="hidden w-full h-full object-cover" autoplay playsinline></video>
                        <canvas id="canvas" class="hidden"></canvas>
                        <img id="photo-preview" class="hidden w-full h-full object-cover">
                        <div id="placeholder" class="text-center p-8">
                            <div class="w-20 h-20 bg-slate-300 rounded-full flex items-center justify-center mx-auto mb-4">
                                <span class="text-3xl">📷</span>
                            </div>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Camera Standby</p>
                        </div>
                    </div>
                    
                    <div class="flex gap-3">
                        <button onclick="startCamera()" class="flex-1 bg-slate-800 text-white py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-all">Start Camera</button>
                        <button onclick="takePhoto()" class="flex-1 bg-orange-500 text-white py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg active:scale-95 transition-all">Capture</button>
                    </div>
                </div>

                <div class="lg:col-span-7 bg-white p-10 rounded-[3rem] shadow-xl border border-slate-100">
                    <div class="space-y-5">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Product Information</label>
                            <input type="text" id="p-name" placeholder="Name of Fish (e.g. Rohu/Katla)" class="w-full p-5 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-orange-500 transition-all">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="p-price" placeholder="Price (₹)" class="w-full p-5 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-orange-500">
                            <input type="text" id="p-weight" placeholder="Unit (1kg/500g)" class="w-full p-5 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-orange-500">
                        </div>

                        <select id="p-category" class="w-full p-5 bg-slate-50 rounded-2xl outline-none font-bold text-sm border-2 border-transparent focus:border-orange-500 appearance-none">
                            <option value="Fresh Water">Fresh Water Fish</option>
                            <option value="Sea Food">Sea Food / Prawns</option>
                            <option value="Dry Fish">Dry Fish Stock</option>
                        </select>

                        <button onclick="uploadProduct()" id="upload-btn" class="w-full bg-[#002e6e] text-white py-6 rounded-[2rem] font-black uppercase tracking-[0.2em] shadow-2xl shadow-blue-200 mt-6 active:scale-95 transition-all">
                            Make it Live 🚀
                        </button>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <div id="status-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
        <div class="bg-white rounded-[3rem] w-full max-w-sm p-10 text-center shadow-2xl">
            <h3 class="text-xl font-black text-slate-800 mb-8 uppercase italic tracking-tighter">Set Order Status</h3>
            <div class="space-y-3">
                <button onclick="updateStatus('Confirmed')" class="w-full p-4 rounded-2xl bg-blue-50 text-blue-700 font-black text-xs uppercase hover:bg-blue-600 hover:text-white transition-all">Order Confirmed</button>
                <button onclick="updateStatus('Packing')" class="w-full p-4 rounded-2xl bg-orange-50 text-orange-700 font-black text-xs uppercase hover:bg-orange-600 hover:text-white transition-all">Cleaning & Packing</button>
                <button onclick="updateStatus('Out for Delivery')" class="w-full p-4 rounded-2xl bg-purple-50 text-purple-700 font-black text-xs uppercase hover:bg-purple-600 hover:text-white transition-all">Out for Delivery</button>
                <button onclick="updateStatus('Delivered')" class="w-full p-4 rounded-2xl bg-green-50 text-green-700 font-black text-xs uppercase hover:bg-green-600 hover:text-white transition-all">Delivered</button>
            </div>
            <button onclick="closeModal()" class="mt-8 text-slate-400 font-black text-[10px] uppercase tracking-widest">Cancel</button>
        </div>
    </div>

    <script>
        // LIVE APPS SCRIPT URL INTEGRATED
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby5IwI7Pmqr5HEkX9zXlna25eZtIYrOZR3R2OXoB2HZjpMK8wNDChWg9XO4A8rYVvxAvA/exec"; 
        let activeOrderId = null;
        let capturedBase64 = "";

        // NAVIGATION LOGIC
        function showSection(section) {
            document.querySelectorAll('.section-card').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            
            document.getElementById(section + '-section').classList.add('active');
            document.getElementById('btn-' + section).classList.add('active');
        }

        // --- CAMERA FUNCTIONS ---
        async function startCamera() {
            const video = document.getElementById('video');
            const placeholder = document.getElementById('placeholder');
            const photoPreview = document.getElementById('photo-preview');
            try {
                placeholder.classList.add('hidden');
                video.classList.remove('hidden');
                photoPreview.classList.add('hidden');
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
            } catch (err) { alert("Camera Permission Required"); }
        }

        function takePhoto() {
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const photoPreview = document.getElementById('photo-preview');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            capturedBase64 = canvas.toDataURL('image/jpeg', 0.6); 
            photoPreview.src = capturedBase64;
            
            video.classList.add('hidden');
            photoPreview.classList.remove('hidden');
            if(video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        }

        // --- PRODUCT UPLOAD ---
        async function uploadProduct() {
            const btn = document.getElementById('upload-btn');
            const data = {
                name: document.getElementById('p-name').value,
                price: document.getElementById('p-price').value,
                weight: document.getElementById('p-weight').value,
                category: document.getElementById('p-category').value,
                image: capturedBase64
            };

            if(!data.name || !data.price || !data.image) {
                alert("Pahle photo kheenchiye aur details bhariye!");
                return;
            }

            btn.innerText = "UPLOADING TO SHEET...";
            btn.disabled = true;

            try {
                // doPost call
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });
                alert("Mubarak ho! Stock live ho chuka hai.");
                location.reload();
            } catch (e) {
                alert("Upload Failed. Check internet.");
                btn.innerText = "RETRY UPLOAD";
                btn.disabled = false;
            }
        }

        // --- ORDER MANAGEMENT ---
        async function fetchOrdersFromSheet() {
            const tbody = document.getElementById('order-body');
            const refreshIcon = document.getElementById('refresh-icon');
            refreshIcon.classList.add('animate-spin');
            
            try {
                const response = await fetch(`${SCRIPT_URL}?action=getOrders`);
                const orders = await response.json();
                
                if(orders.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center font-bold text-slate-400 uppercase tracking-widest">No orders yet.</td></tr>`;
                } else {
                    tbody.innerHTML = orders.map(order => `
                        <tr class="hover:bg-slate-50/50 transition-all group">
                            <td class="p-6">
                                <p class="font-black text-[#002e6e] italic tracking-tighter uppercase">#${order.id}</p>
                                <div class="mt-1">
                                    <p class="text-xs font-bold text-slate-800">${order.name}</p>
                                    <p class="text-[9px] text-slate-400 font-black tracking-widest uppercase">${order.phone}</p>
                                </div>
                            </td>
                            <td class="p-6 text-center font-black text-slate-800 italic">₹${order.total}</td>
                            <td class="p-6 text-center">
                                <span class="px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest ${getStatusStyle(order.status)}">
                                    ${order.status}
                                </span>
                            </td>
                            <td class="p-6 text-right">
                                <button onclick="openStatusModal('${order.id}')" class="bg-[#002e6e] text-white px-5 py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest hover:bg-orange-500 transition-all shadow-lg shadow-blue-100">
                                    Update Status
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-20 text-center font-bold text-red-400">SERVER ERROR: CHECK SCRIPT URL</td></tr>`;
            } finally {
                refreshIcon.classList.remove('animate-spin');
            }
        }

        function getStatusStyle(status) {
            if(status === 'Confirmed') return 'bg-blue-100 text-blue-600';
            if(status === 'Packing') return 'bg-orange-100 text-orange-600';
            if(status === 'Out for Delivery') return 'bg-purple-100 text-purple-600';
            if(status === 'Delivered') return 'bg-green-100 text-green-600';
            return 'bg-slate-100 text-slate-500';
        }

        function openStatusModal(id) { activeOrderId = id; document.getElementById('status-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('status-modal').classList.add('hidden'); }

        async function updateStatus(newStatus) {
            try {
                const response = await fetch(`${SCRIPT_URL}?action=updateStatus&id=${activeOrderId}&status=${newStatus}`);
                const res = await response.json();
                if(res.result === "Success") {
                    closeModal();
                    fetchOrdersFromSheet();
                }
            } catch (e) {
                alert("Update failed. Try again.");
            }
        }

        window.onload = fetchOrdersFromSheet;
    </script>
</body>
</html>
