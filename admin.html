<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK Admin | Firebase Connect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-[30px] shadow-xl">
        <h1 class="text-2xl font-black mb-6 italic text-[#e03546]">ADD PRODUCT TO FIREBASE</h1>
        
        <div class="space-y-4">
            <input type="text" id="p-name" placeholder="Fish Name" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <input type="number" id="p-price" placeholder="Price (₹)" class="w-full p-4 bg-slate-100 rounded-2xl outline-none">
            <select id="p-cat" class="w-full p-4 bg-slate-100 rounded-2xl outline-none font-bold">
                <option value="river">River Fish</option>
                <option value="sea">Sea Food</option>
                <option value="prawns">Prawns</option>
                <option value="bengali">Bengali Cut</option>
            </select>
            
            <div id="upload-btn" class="border-2 border-dashed p-10 rounded-2xl text-center cursor-pointer hover:bg-slate-50">
                <p id="status-text" class="text-sm font-bold text-slate-400">Click to Upload Image</p>
                <input type="hidden" id="p-img">
            </div>

            <button id="save-btn" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase tracking-widest">Publish to Website</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDWHPt3Kya_s-9f62RsLfI_G1RgQU5P534",
            authDomain: "kfk-fish.firebaseapp.com",
            projectId: "kfk-fish",
            storageBucket: "kfk-fish.firebasestorage.app",
            messagingSenderId: "171442898165",
            appId: "1:171442898165:web:9234070d781b8138d4b1bc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Cloudinary Upload Logic
        const myWidget = cloudinary.createUploadWidget({
            cloudName: "Zva3N4n6Rzk_q0u488feojXID40", 
            uploadPreset: "ml_default" 
        }, (error, result) => {
            if (!error && result && result.event === "success") {
                document.getElementById('p-img').value = result.info.secure_url;
                document.getElementById('status-text').innerText = "✅ Image Ready!";
            }
        });

        document.getElementById("upload-btn").onclick = () => myWidget.open();

        // Firebase Save Logic
        document.getElementById("save-btn").onclick = async () => {
            const btn = document.getElementById("save-btn");
            btn.innerText = "Publishing...";
            btn.disabled = true;

            try {
                await addDoc(collection(db, "products"), {
                    name: document.getElementById('p-name').value,
                    price: Number(document.getElementById('p-price').value),
                    category: document.getElementById('p-cat').value,
                    image: document.getElementById('p-img').value,
                    timestamp: new Date()
                });
                alert("Product Added Successfully!");
                location.reload();
            } catch (e) {
                console.error("Error adding document: ", e);
                alert("Error! Check Console.");
            }
        };
    </script>
</body>
</html>
