<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smile Finance - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="container mx-auto py-10 px-4">
        <h1 class="text-3xl font-bold text-blue-800 mb-8 text-center">Smile Finance Admin Control</h1>

        <div class="max-w-2xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-gray-200">
            <h2 class="text-xl font-semibold mb-6 text-gray-700 underline">Add New Affiliate Offer</h2>
            
            <div class="grid grid-cols-1 gap-5">
                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">Product Name</label>
                    <input id="prodName" type="text" placeholder="HDFC Tata Neu Credit Card" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">Category</label>
                        <select id="prodCat" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="credit-card">Credit Card</option>
                            <option value="loan">Loans</option>
                            <option value="insurance">Insurance</option>
                            <option value="saving-account">Saving Account</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-1">Commission/Payout</label>
                        <input id="prodPayout" type="text" placeholder="e.g. ₹2500" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">Affiliate/Apply Link</label>
                    <input id="prodLink" type="text" placeholder="https://..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">Image URL (Direct Link)</label>
                    <input id="prodImg" type="text" placeholder="Aapki image ka link" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-600 mb-1">Key Benefits (Comma separated)</label>
                    <textarea id="prodDesc" placeholder="No joining fee, 5% cashback, Lounge access" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>

                <button onclick="saveToFirebase()" class="bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition-all shadow-lg active:scale-95">
                    🚀 Publish Offer to Website
                </button>
            </div>
        </div>
    </div>

    <script>
        // Firebase Configuration (Directly Integrated)
        const firebaseConfig = {
            apiKey: "AIzaSyD3FEfP9Htj3ANvIENwzlNIKZRE7qIYFBc",
            authDomain: "smile-finance-ai-2026.firebaseapp.com",
            databaseURL: "https://smile-finance-ai-2026-default-rtdb.firebaseio.com",
            projectId: "smile-finance-ai-2026",
            storageBucket: "smile-finance-ai-2026.firebasestorage.app",
            messagingSenderId: "325593143394",
            appId: "1:325593143394:web:2b5f3c2404279d4594d93b"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Data Save Karne Ka Function
        function saveToFirebase() {
            const name = document.getElementById('prodName').value;
            const category = document.getElementById('prodCat').value;
            const payout = document.getElementById('prodPayout').value;
            const link = document.getElementById('prodLink').value;
            const image = document.getElementById('prodImg').value;
            const desc = document.getElementById('prodDesc').value;

            if(name === "" || payout === "") {
                alert("Bhai, kam se kam naam aur payout toh bharo!");
                return;
            }

            // Database mein 'products' folder ke andar data jayega
            const productRef = database.ref('products/').push();
            productRef.set({
                name: name,
                category: category,
                payout: payout,
                link: link,
                image: image,
                desc: desc,
                timestamp: Date.now()
            }).then(() => {
                alert("Mubarak ho! Offer live ho gaya hai.");
                // Form clear karne ke liye
                location.reload();
            }).catch((error) => {
                alert("Error aaya: " + error.message);
            });
        }
    </script>
</body>
</html>
