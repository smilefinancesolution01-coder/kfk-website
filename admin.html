<div class="max-w-4xl mx-auto p-10 bg-white shadow-2xl rounded-[3rem] mt-10">
    <h2 class="text-3xl font-black text-[#002e6e] mb-6 italic">UPLOAD NEW PRODUCT</h2>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="space-y-4">
            <input type="text" id="p-name" placeholder="Item Name (e.g. Fresh Rohu)" class="w-full p-4 bg-slate-100 rounded-2xl outline-none font-bold">
            <input type="text" id="p-price" placeholder="Price (₹)" class="w-full p-4 bg-slate-100 rounded-2xl outline-none font-bold">
            <input type="file" id="p-image" accept="image/*" class="w-full p-4 bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl cursor-pointer">
            <button onclick="saveToMenu()" class="w-full bg-orange-500 text-white py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-[#002e6e] transition-all shadow-lg">Save to Menu</button>
        </div>
        
        <div id="preview-box" class="h-64 bg-slate-50 rounded-[2rem] border-2 border-slate-100 flex items-center justify-center overflow-hidden">
            <span class="text-slate-400 font-bold">Image Preview</span>
        </div>
    </div>
</div>

<script>
    // Image Preview Logic
    document.getElementById('p-image').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('preview-box').innerHTML = `<img src="${event.target.result}" class="w-full h-full object-cover">`;
        }
        reader.readAsDataURL(file);
    });

    // Save Function
    function saveToMenu() {
        const name = document.getElementById('p-name').value;
        const price = document.getElementById('p-price').value;
        const file = document.getElementById('p-image').files[0];

        if(!name || !price || !file) {
            alert("Please fill all details!");
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            const product = {
                id: Date.now(),
                name: name,
                price: price,
                image: e.target.result // Base64 Image
            };

            let menu = JSON.parse(localStorage.getItem('kfk_custom_menu')) || [];
            menu.push(product);
            localStorage.setItem('kfk_custom_menu', JSON.stringify(menu));
            
            alert("✅ Product Added Successfully!");
            location.reload(); 
        };
        reader.readAsDataURL(file);
    }
</script>
