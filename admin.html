<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFK Admin | Control Center Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f4f7fa; }
        .nav-link.active { background: #f97316; color: white; box-shadow: 0 10px 15px -3px rgba(249, 115, 22, 0.3); }
        .section-card { display: none; }
        .section-card.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col lg:flex-row min-h-screen">

    <aside class="w-full lg:w-72 bg-[#002e6e] text-white p-8 flex flex-col shadow-2xl z-50">
        <div class="mb-12 text-center lg:text-left">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase text-orange-500 leading-none">KFK <br> ADMIN</h1>
            <div class="h-1 w-12 bg-orange-500 mt-2 mx-auto lg:mx-0"></div>
        </div>
        <nav class="space-y-3 flex-1">
            <button onclick="showSection('orders')" id="btn-orders" class="nav-link active w-full p-4 rounded-2xl font-bold flex items-center gap-4 transition-all hover:bg-white/10 text-left italic">
                <span>📦</span> LIVE ORDERS
            </button>
            <button onclick="showSection('add-product')" id="btn-add-product" class="nav-link w-full p-4 rounded-2xl font-bold flex items-center gap-4 transition-all hover:bg-white/10 text-left italic">
                <span>📸</span> ADD FISH STOCK
            </button>
            <button onclick="showSection('manage-stock')" id="btn-manage-stock" class="nav-link w-full p-4 rounded-2xl font-bold flex items-center gap-4 transition-all hover:bg-white/10 text-left italic">
                <span>🛠️</span> MANAGE MENU
            </button>
        </nav>
        <div class="pt-6 border-t border-white/10">
            <p class="text-[10px] font-bold uppercase tracking-widest text-blue-300 italic">Smile Financial Solutions</p>
        </div>
    </aside>

    <main class="flex-1 p-6 lg:p-12 overflow-y-auto">
        
        <section id="orders-section" class="section-card active">
            <h2 class="text-4xl font-black text-slate-800 italic uppercase mb-10 tracking-tighter">Live Orders</h2>
            <div id="order-list" class="grid grid-cols-1 md:grid-cols-2 gap-6 font-bold">
                <div class="col-span-full py-20 text-center text-slate-300 italic font-black uppercase tracking-widest">Loading orders...</div>
            </div>
        </section>

        <section id="add-product-section" class="section-card">
            <h2 class="text-4xl font-black text-slate-800 italic uppercase mb-10 tracking-tighter">Add Multi-Photo Stock</h2>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="space-y-6">
                    <div class="relative aspect-square bg-slate-200 rounded-[3rem] overflow-hidden border-4 border-white shadow-2xl flex items-center justify-center">
                        <video id="video" class="hidden w-full h-full object-cover" autoplay playsinline></video>
                        <canvas id="canvas" class="hidden"></canvas>
                        <div id="placeholder" class="text-center text-slate-400">
                            <span class="text-5xl">📷</span>
                            <p class="mt-2 font-black text-[10px] uppercase tracking-widest italic">Camera Ready</p>
                        </div>
                    </div>
                    <div id="multi-preview" class="flex gap-4 overflow-x-auto p-2 scrollbar-hide min-h-[100px] bg-white rounded-2xl shadow-inner border border-dashed border-slate-300"></div>
                    <div class="flex gap-3">
                        <button onclick="startCamera()" class="flex-1 bg-slate-800 text-white py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest italic active:scale-95 transition-all">Start Cam</button>
                        <button onclick="takePhoto()" class="flex-1 bg-orange-500 text-white py-5 rounded-2xl font-black text-[10px] uppercase tracking-widest italic active:scale-95 transition-all">Capture</button>
                    </div>
                </div>

                <div class="bg-white p-10 rounded-[3rem] shadow-xl space-y-5 border border-slate-100">
                    <input type="text" id="p-name" placeholder="Fish Name" class="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-orange-500 font-bold outline-none transition-all italic">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="p-price" placeholder="Price (₹)" class="w-full p-5 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-orange-500 font-bold italic">
                        <input type="text" id="p-weight" placeholder="Unit (e.g. 1kg)" class="w-full p-5 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-orange-500 font-bold italic">
                    </div>
                    <button onclick="uploadToFirebase()" id="upload-btn" class="w-full bg-[#002e6e] text-white py-6 rounded-[2rem] font-black uppercase tracking-[0.2em] shadow-2xl active:scale-95 transition-all italic">Make it Live 🚀</button>
                </div>
            </div>
        </section>

        <section id="manage-stock-section" class="section-card">
            <h2 class="text-4xl font-black text-slate-800 italic uppercase mb-10 tracking-tighter">Stock Inventory</h2>
            <div id="stock-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDWHPt3Kya_s-9f62RsLfI_G1RgQU5P534",
            authDomain: "kfk-fish.firebaseapp.com",
            projectId: "kfk-fish",
            storageBucket: "kfk-fish.firebasestorage.app",
            messagingSenderId: "171442898165",
            appId: "1:171442898165:web:9234070d781b8138d4b1bc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let imageArray = [];

        // --- CAMERA ---
        window.startCamera = async () => {
            const video = document.getElementById('video');
            document.getElementById('placeholder').classList.add('hidden');
            video.classList.remove('hidden');
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
        };

        window.takePhoto = () => {
            if(imageArray.length >= 4) return alert("Max 4 photos limit!");
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            imageArray.push(canvas.toDataURL('image/jpeg', 0.5));
            renderPreviews();
        };

        window.renderPreviews = () => {
            document.getElementById('multi-preview').innerHTML = imageArray.map((img, i) => `
                <div class="relative min-w-[80px] h-20">
                    <img src="${img}" class="w-full h-full object-cover rounded-xl border-2 border-white">
                    <button onclick="removeImg(${i})" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 text-[10px] font-bold">X</button>
                </div>
            `).join('');
        };
        window.removeImg = (i) => { imageArray.splice(i, 1); renderPreviews(); };

        // --- MANAGE PRODUCTS (ADD & DELETE) ---
        window.uploadToFirebase = async () => {
            const btn = document.getElementById('upload-btn');
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const weight = document.getElementById('p-weight').value;
            if(!name || imageArray.length === 0) return alert("Details missing!");
            
            btn.disabled = true; btn.innerText = "UPLOADING...";
            try {
                await addDoc(collection(db, "products"), { name, price, weight, images: imageArray, createdAt: serverTimestamp() });
                alert("Stock Added!");
                location.reload();
            } catch (e) { alert(e.message); btn.disabled = false; }
        };

        window.loadStock = async () => {
            const list = document.getElementById('stock-list');
            const snap = await getDocs(query(collection(db, "products"), orderBy("createdAt", "desc")));
            list.innerHTML = "";
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl shadow-lg flex items-center gap-4 border border-slate-50">
                        <img src="${p.images[0]}" class="w-16 h-16 rounded-2xl object-cover">
                        <div class="flex-1">
                            <p class="font-black text-slate-800 uppercase text-[10px] italic">${p.name}</p>
                            <p class="text-orange-500 font-bold text-[10px]">₹${p.price} • ${p.weight}</p>
                        </div>
                        <button onclick="deleteProduct('${d.id}')" class="bg-red-50 text-red-500 p-3 rounded-xl font-black text-[9px] uppercase hover:bg-red-500 hover:text-white transition-all">Del</button>
                    </div>
                `;
            });
        };

        window.deleteProduct = async (id) => {
            if(confirm("Permanently delete this product from menu?")) {
                try {
                    await deleteDoc(doc(db, "products", id));
                    window.loadStock();
                } catch(e) { alert(e.message); }
            }
        };

        // --- MANAGE ORDERS ---
        window.loadOrders = async () => {
            const list = document.getElementById('order-list');
            const snap = await getDocs(query(collection(db, "orders"), orderBy("createdAt", "desc")));
            list.innerHTML = "";
            if(snap.empty) {
                list.innerHTML = `<div class="col-span-full py-20 text-center text-slate-300 italic">NO ACTIVE ORDERS</div>`;
                return;
            }
            snap.forEach(d => {
                const o = d.data();
                const statusColor = o.status === 'Packed' ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600';
                list.innerHTML += `
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border-l-8 border-orange-500 flex flex-col gap-3 relative">
                        <div class="flex justify-between">
                            <h3 class="font-black text-slate-800 uppercase text-xs italic">${o.item}</h3>
                            <span class="${statusColor} px-3 py-1 rounded-full text-[8px] font-black uppercase">${o.status || 'Pending'}</span>
                        </div>
                        <div class="text-[10px] text-slate-600 space-y-1">
                            <p class="italic">👤 <b>${o.customerName}</b> (${o.customerPhone || 'No Phone'})</p>
                            <p class="text-slate-400">📍 ${o.address}</p>
                            <p>💰 ₹${o.price} via <span class="text-blue-600 font-black italic">${o.payment}</span></p>
                        </div>
                        <div class="flex gap-2 mt-2">
                            <button onclick="updateStatus('${d.id}', 'Packed')" class="flex-1 bg-blue-50 text-blue-600 py-3 rounded-xl font-black text-[9px] uppercase hover:bg-blue-600 hover:text-white transition-all italic">Packed & Notify</button>
                            <button onclick="deleteOrder('${d.id}')" class="bg-red-50 text-red-500 px-4 rounded-xl font-black text-[9px] uppercase italic hover:bg-red-500 hover:text-white">Cancel</button>
                        </div>
                    </div>
                `;
            });
        };

        window.updateStatus = async (id, s) => {
            const orderRef = doc(db, "orders", id);
            await updateDoc(orderRef, { status: s });
            const snap = await getDocs(collection(db, "orders"));
            let oData = null;
            snap.forEach(doc => { if(doc.id === id) oData = doc.data(); });
            
            if(oData && s === 'Packed') {
                const msg = `*KFK FRESH UPDATE* 📦%0A%0AHi *${oData.customerName}*,%0A%0AAapka order *${oData.item}* pack ho chuka hai!%0A%0A📍 *Address:* ${oData.address}%0A💰 *Price:* ₹${oData.price}%0A%0ATeam jald hi delivery ke liye niklegi.`;
                window.open(`https://wa.me/?text=${msg}`, '_blank');
            }
            window.loadOrders();
        };

        window.deleteOrder = async (id) => {
            if(confirm("Cancel this order?")) {
                await deleteDoc(doc(db, "orders", id));
                window.loadOrders();
            }
        };

        // INITIAL LOAD
        window.onload = () => { window.loadStock(); window.loadOrders(); };
    </script>

    <script>
        function showSection(s) {
            document.querySelectorAll('.section-card').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(s + '-section').classList.add('active');
            document.getElementById('btn-' + s).classList.add('active');
        }
    </script>
</body>
</html>
