<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | KFK India</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f4f8; }
        .status-pill { transition: all 0.3s ease; }
    </style>
</head>
<body class="flex flex-col lg:flex-row min-h-screen">

    <aside class="w-full lg:w-64 bg-[#002e6e] text-white p-6 shadow-2xl">
        <div class="mb-10 text-center">
            <h1 class="text-2xl font-black italic tracking-tighter">KFK ADMIN</h1>
            <p class="text-[10px] text-blue-300 font-bold uppercase tracking-widest mt-1">Order Control Center</p>
        </div>
        <nav class="space-y-2">
            <a href="#" class="block p-4 bg-orange-500 rounded-2xl font-bold flex items-center gap-3 shadow-lg">
                <span>📦</span> Live Orders
            </a>
            <a href="#" class="block p-4 hover:bg-white/10 rounded-2xl font-bold transition-all flex items-center gap-3">
                <span>📈</span> Sales Report
            </a>
            <a href="#" class="block p-4 hover:bg-white/10 rounded-2xl font-bold transition-all flex items-center gap-3">
                <span>🐟</span> Manage Menu
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-4 lg:p-10">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h2 class="text-3xl font-black text-slate-800 italic uppercase">Incoming Orders</h2>
                <p class="text-slate-500 font-bold text-sm uppercase tracking-widest">Manage real-time delivery tracking</p>
            </div>
            <button onclick="fetchOrdersFromSheet()" class="bg-white px-6 py-3 rounded-2xl font-bold text-[#002e6e] shadow-sm border border-slate-200 hover:shadow-md active:scale-95 flex items-center gap-2">
                <span class="animate-spin">🔄</span> Refresh Orders
            </button>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Order ID</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Customer</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Total</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Tracking Status</th>
                            <th class="p-6 text-[10px] font-black text-slate-400 uppercase tracking-widest">Action</th>
                        </tr>
                    </thead>
                    <tbody id="order-body" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="status-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-8">
            <h3 class="text-xl font-black text-slate-800 mb-6 uppercase italic">Update Status</h3>
            <div class="space-y-3" id="status-options">
                <button onclick="updateStatus('Confirmed')" class="w-full p-4 rounded-2xl bg-slate-50 font-bold hover:bg-blue-50 hover:text-blue-600 border border-transparent hover:border-blue-200">Order Confirmed</button>
                <button onclick="updateStatus('Packing')" class="w-full p-4 rounded-2xl bg-slate-50 font-bold hover:bg-orange-50 hover:text-orange-600 border border-transparent hover:border-orange-200">Cleaning & Packing</button>
                <button onclick="updateStatus('Out for Delivery')" class="w-full p-4 rounded-2xl bg-slate-50 font-bold hover:bg-purple-50 hover:text-purple-600 border border-transparent hover:border-purple-200">Out for Delivery</button>
                <button onclick="updateStatus('Delivered')" class="w-full p-4 rounded-2xl bg-slate-50 font-bold hover:bg-green-50 hover:text-green-600 border border-transparent hover:border-green-200">Delivered</button>
            </div>
            <button onclick="closeModal()" class="mt-6 w-full text-slate-400 font-bold text-xs uppercase tracking-widest">Close</button>
        </div>
    </div>

    <script>
        // Yahan aapka Apps Script URL aayega
        const SCRIPT_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL";
        let activeOrderId = null;

        async function fetchOrdersFromSheet() {
            const tbody = document.getElementById('order-body');
            tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center font-bold text-slate-400 animate-pulse">Fetching Live Data...</td></tr>`;

            try {
                const response = await fetch(`${SCRIPT_URL}?action=getOrders`);
                const orders = await response.json();
                
                tbody.innerHTML = orders.map(order => `
                    <tr class="hover:bg-slate-50/50 transition-all">
                        <td class="p-6 font-black text-[#002e6e]">#${order.id}</td>
                        <td class="p-6">
                            <p class="font-bold text-slate-800 uppercase text-xs">${order.name}</p>
                            <p class="text-[10px] text-slate-400 font-bold tracking-widest">${order.phone}</p>
                        </td>
                        <td class="p-6 font-black text-slate-800 italic">₹${order.total}</td>
                        <td class="p-6">
                            <span class="px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest ${getStatusStyle(order.status)}">
                                ${order.status}
                            </span>
                        </td>
                        <td class="p-6">
                            <button onclick="openStatusModal('${order.id}')" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-orange-500 transition-all shadow-sm">
                                Change Status
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500 font-bold">Failed to load orders. Check Script URL.</td></tr>`;
            }
        }

        function getStatusStyle(status) {
            if(status === 'Confirmed') return 'bg-blue-100 text-blue-600';
            if(status === 'Packing') return 'bg-orange-100 text-orange-600';
            if(status === 'Out for Delivery') return 'bg-purple-100 text-purple-600';
            if(status === 'Delivered') return 'bg-green-100 text-green-600';
            return 'bg-slate-100 text-slate-600';
        }

        function openStatusModal(id) {
            activeOrderId = id;
            document.getElementById('status-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('status-modal').classList.add('hidden');
        }

        async function updateStatus(newStatus) {
            // Real update logic
            const response = await fetch(`${SCRIPT_URL}?action=updateStatus&id=${activeOrderId}&status=${newStatus}`);
            if(response.ok) {
                alert(`Order #${activeOrderId} updated to ${newStatus}`);
                closeModal();
                fetchOrdersFromSheet();
            }
        }

        // Auto Refresh every 60 seconds
        setInterval(fetchOrdersFromSheet, 60000);
        window.onload = fetchOrdersFromSheet;
    </script>
</body>
</html>
