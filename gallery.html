<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | KFK India - Freshness in Frames</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .hero-font { font-family: 'Outfit', sans-serif; }
        .gallery-item { break-inside: avoid; margin-bottom: 1.5rem; transition: all 0.4s ease; cursor: pointer; }
        .gallery-item:hover { transform: scale(1.02); filter: brightness(1.1); }
        .masonry { column-count: 2; column-gap: 1.5rem; }
        @media (min-width: 768px) { .masonry { column-count: 3; } }
        @media (min-width: 1024px) { .masonry { column-count: 4; } }
    </style>
</head>
<body class="bg-white text-slate-900">

    <header class="sticky top-0 z-[100] bg-white/90 backdrop-blur-md border-b">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <a href="index.html" class="text-3xl font-black text-[#002e6e] hero-font italic">KFK<span class="text-orange-500">.</span>INDIA</a>
            <nav class="hidden md:flex gap-8 text-[11px] font-black uppercase tracking-widest">
                <a href="index.html">Home</a>
                <a href="menu.html">Products</a>
                <a href="gallery.html" class="text-orange-500">Gallery</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <section class="py-20 bg-slate-50 text-center">
        <h1 class="text-5xl md:text-8xl font-black hero-font uppercase italic leading-none">Our <span class="text-orange-500">World.</span></h1>
        <p class="mt-6 text-slate-400 font-bold uppercase tracking-[0.3em] text-[10px]">From the River to your kitchen | Visual Journey</p>
    </section>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div id="gallery-container" class="masonry">
            </div>
    </main>

    <footer class="bg-black text-white py-12 px-6">
        <div class="max-w-7xl mx-auto text-center">
            <h2 class="text-2xl font-black hero-font italic mb-4">FOLLOW THE FRESHNESS @KFKINDIA</h2>
            <div class="flex justify-center gap-6 mt-10 text-[10px] font-black uppercase tracking-widest text-gray-500">
                <a href="about.html">Our Story</a>
                <a href="franchise.html">Franchise</a>
                <a href="compliance.html">Compliance</a>
            </div>
        </div>
    </footer>

    <script>
        const API_KEY = "kfzzPEicE21y0WcDJEMhLn0eUETxYReptyKIbwehcGdtGB3oW4Ka7xYj";
        const queries = ['fresh fish river', 'raw meat chicken', 'mutton cooking', 'seafood platter', 'indian fish market', 'fresh prawns', 'butcher shop professional', 'cooking fish curry'];

        async function loadGallery() {
            const container = document.getElementById('gallery-container');
            for(let q of queries) {
                try {
                    const res = await fetch(`https://api.pexels.com/v1/search?query=${q}&per_page=2`, { headers: { Authorization: API_KEY } });
                    const data = await res.json();
                    data.photos.forEach(photo => {
                        const div = document.createElement('div');
                        div.className = 'gallery-item';
                        div.innerHTML = `<img src="${photo.src.large}" class="w-full rounded-[2rem] shadow-lg border border-gray-100">`;
                        container.appendChild(div);
                    });
                } catch(e) { console.error(e); }
            }
        }
        loadGallery();
    </script>
</body>
</html>
